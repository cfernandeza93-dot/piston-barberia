async function processImportFile(input){
  const file = input.files[0];
  if(!file) return;
  const tipo = document.getElementById('importTipo').value;
  const loading = document.getElementById('importLoading');
  loading.style.display='block';
  document.getElementById('importPreviewSection').style.display='none';

  try {
    const isXLSX = file.name.match(/\.xlsx?$/i);
    let rows = [];

    if(isXLSX){
      const XL = await getXLSX();
      const buf = await file.arrayBuffer();
      const wb = XL.read(buf, {type:'array', cellDates:true});

      // Find the right sheet
      let sheetName = wb.SheetNames[0];
      if(tipo==='ventas'){
        const v3 = wb.SheetNames.find(n=>n.toLowerCase().includes('venta'));
        if(v3) sheetName = v3;
      }

      const ws = wb.Sheets[sheetName];
      // Get all rows as array of arrays (raw, to handle multi-row headers)
      const raw = XL.utils.sheet_to_json(ws, {header:1, defval:null, raw:false});

      // Find header row: the row that contains "Barbero" and "Fecha"
      let headerIdx = 0;
      for(let i=0;i<Math.min(5,raw.length);i++){
        const row = raw[i].map(c=>String(c||'').toLowerCase());
        if(row.some(c=>c.includes('barbero')) && row.some(c=>c.includes('fecha'))){
          headerIdx = i; break;
        }
      }
      const headers = raw[headerIdx].map(h=>String(h||'').trim());
      // Data rows start after header
      const dataRaws = raw.slice(headerIdx+1).filter(r=>r.some(c=>c!==null&&String(c).trim()!==''));
      rows = dataRaws.map(r=>{
        const obj={};
        headers.forEach((h,i)=>{ obj[h] = r[i]!=null ? String(r[i]).trim() : ''; });
        return obj;
      });

    } else {
      // CSV
      const buf = await file.arrayBuffer();
      // Handle BOM (UTF-8 BOM = EF BB BF)
      let text = new TextDecoder('utf-8').decode(buf);
      if(text.charCodeAt(0)===0xFEFF) text=text.slice(1); // strip BOM

      const lines = text.split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2){ toast('Archivo vacío','error'); loading.style.display='none'; return; }
      const delim = lines[0].split(';').length > lines[0].split(',').length ? ';' : ',';

      // Find the real header row: the first row that contains "Barbero" or "barbero"
      let headerIdx = 0;
      for(let i=0;i<Math.min(5,lines.length);i++){
        const low = lines[i].toLowerCase();
        if(low.includes('barbero') && (low.includes('fecha') || low.includes('monto'))){
          headerIdx = i; break;
        }
      }

      const headers = lines[headerIdx].split(delim).map(h=>h.trim().replace(/^"|"$/g,''));
      rows = lines.slice(headerIdx+1).map(line=>{
        const cols=[]; let cur='', inQ=false;
        for(const ch of line){
          if(ch==='"') inQ=!inQ;
          else if(ch===delim&&!inQ){cols.push(cur.trim());cur='';}
          else cur+=ch;
        }
        cols.push(cur.trim());
        const obj={};
        headers.forEach((h,i)=>obj[h]=(cols[i]||'').replace(/^"|"$/g,'').trim());
        return obj;
      }).filter(r=>Object.values(r).some(v=>v));
    }

    if(rows.length===0){ toast('No se encontraron datos','error'); loading.style.display='none'; return; }

    await loadCatalogos();
    importPreview = tipo==='ventas' ? parseVentasRows(rows) : parseGastosRows(rows);
    loading.style.display='none';
    renderImportPreview(tipo);

  } catch(err){
    loading.style.display='none';
    toast('Error al procesar: '+err.message,'error');
    console.error(err);
  }
}

// ---- helpers ----
function nH(h){ return String(h||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,''); }

function getCol(row, ...keys){
  for(const k of keys){
    const nk=nH(k);
    const found=Object.keys(row).find(rk=>nH(rk)===nk||nH(rk).startsWith(nk)||nk.startsWith(nH(rk)));
    if(found!==undefined && row[found]!==null && String(row[found]).trim()!=='') return String(row[found]).trim();
  }
  return '';
}

function pNum(v){
  if(v===null||v===undefined||v==='') return 0;
  // Handle Chilean format: $16.000 or $ 16.000 or 16.000 or 16,000
  // Step 1: remove currency symbol, spaces
  let s = String(v).replace(/\$/g,'').replace(/\s+/g,'');
  // Step 2: if dot is used as thousands separator (e.g. 16.000 → 16000)
  // Detect: if dot exists but no comma, and the part after last dot is exactly 3 digits → thousands dot
  // Also handles 1.600.000 style
  if(s.includes('.') && !s.includes(',')){
    // Check if ALL dots are thousands separators (every group after dot = 3 digits)
    const parts = s.split('.');
    const allThousands = parts.slice(1).every(p=>p.length===3&&/^\d+$/.test(p));
    if(allThousands) s = parts.join(''); // remove all dots → 16000
    // else treat dot as decimal separator (leave as is)
  } else if(s.includes(',')&&s.includes('.')){
    // e.g. 1.600,50 → 1600.50
    s = s.replace(/\./g,'').replace(',','.');
  } else if(s.includes(',')){
    // comma as decimal: 16,000 → could be 16.0 or 16000; assume thousands if 3 digits after comma
    const afterComma = s.split(',')[1]||'';
    if(afterComma.length===3&&/^\d+$/.test(afterComma)) s=s.replace(',','');
    else s=s.replace(',','.');
  }
  const n=parseFloat(s);
  return isNaN(n)?0:Math.round(n);
}

function pFecha(v){
  if(!v||String(v).trim()==='') return null;
  v=String(v).trim();
  // Already YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
  // Excel date string like "2026-01-03T00:00:00.000Z" or "Sat Jan 03 2026..."
  const iso=v.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso) return `${iso[1]}-${iso[2]}-${iso[3]}`;
  // DD/MM/YYYY or DD-MM-YYYY
  const dmy=v.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/);
  if(dmy) return `${dmy[3]}-${dmy[2].padStart(2,'0')}-${dmy[1].padStart(2,'0')}`;
  // MM/DD/YYYY (US)
  const mdy=v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(mdy&&Number(mdy[1])<=12) return `${mdy[3]}-${mdy[1].padStart(2,'0')}-${mdy[2].padStart(2,'0')}`;
  // Date serial (Excel number)
  const n=Number(v);
  if(!isNaN(n)&&n>40000&&n<60000){
    const d=new Date(Math.round((n-25569)*86400*1000));
    return d.toISOString().split('T')[0];
  }
  return null;
}

function normalizeFP(v){
  // TF → TRF (used in the Cierre Diario), TK  → TK, EF → EF
  const s=String(v||'').toUpperCase().trim().replace(/\s+/g,'');
  if(s==='TF'||s==='TRF'||s.includes('TRANSF')) return 'TRF';
  if(s==='TK'||s.includes('TARJ')||s.includes('CARD')) return 'TK';
  return 'EF';
}

function normalizeTipo(v){
  const s=String(v||'').toLowerCase().trim();
  return s.includes('prod')?'PRODUCTO':'servicio';
}

function normalizeDiaSemana(v){
  // Capitalise and strip accents for display; map to canonical
  const map={domingo:'Domingo',lunes:'Lunes',martes:'Martes',miercoles:'Miércoles',
             'miércoles':'Miércoles',jueves:'Jueves',viernes:'Viernes',sabado:'Sábado','sábado':'Sábado'};
  const k=String(v||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  return map[k]||String(v||'').trim();
}

function parseVentasRows(rows){
  return rows.map((r,idx)=>{
    // === Compatible con el CSV limpio exportado Y con el XLSX Ventas v3 ===
    const barberoNombre = (getCol(r,'barbero','Barbero') || '').toUpperCase().trim();
    const fechaRaw = getCol(r,'fecha','Fecha');
    const fecha = pFecha(fechaRaw);
    const d = fecha ? new Date(fecha+'T12:00:00') : null;

    // Campos de fecha — vienen pre-calculados en el CSV limpio
    const anio   = pNum(getCol(r,'anio','Año','año')) || (d?d.getFullYear():null);
    const nMes   = pNum(getCol(r,'n_mes','N° Mes','nmes')) || (d?d.getMonth()+1:null);
    const mesNom = getCol(r,'mes','Mes') || (d?MESES[d.getMonth()]:'');
    const diaNum = pNum(getCol(r,'dia','Día Num')) || (d?d.getDate():null);
    const diaSem = normalizeDiaSemana(getCol(r,'dia_semana','Día','Dia semana')) || (d?DIAS_ES[d.getDay()]:'');

    const tipo   = normalizeTipo(getCol(r,'tipo','Tipo de Venta'));
    const fp     = normalizeFP(getCol(r,'forma_pago','Forma de pago','Forma pago'));
    const monto  = pNum(getCol(r,'monto','Monto'));
    const propina= pNum(getCol(r,'propina','Propina'));
    const desc   = pNum(getCol(r,'descuento','Descuento'));
    const totalR = pNum(getCol(r,'total','Total'));
    const total  = totalR || (monto+propina-desc);

    const codAuth= getCol(r,'cod_autorizacion','Cod Autorizacion','Cod. Autorizacion') || null;
    const boleta = getCol(r,'boleta','N° Boleta') || null;
    const cliente= getCol(r,'cliente','Cliente') || null;
    const svcProd= getCol(r,'servicio_producto','servicio/ Producto','servicio/producto') || '';
    const coment = getCol(r,'comentarios','Comentarios') || null;

    const errors=[];
    if(!fecha) errors.push('sin fecha');
    if(!barberoNombre) errors.push('sin barbero');
    if(!monto&&!total) errors.push('sin monto');

    return {
      _row:idx+2, _errors:errors, _barberoNombre:barberoNombre,
      barbero_nombre:barberoNombre, barbero_id:null,
      cod_autorizacion:codAuth||null, boleta:boleta||null,
      anio, n_mes:nMes, mes:mesNom, dia:diaNum, dia_semana:diaSem,
      fecha, tipo, cliente:cliente||null,
      servicio_producto:svcProd.trim(),
      monto, propina, descuento:desc, total,
      forma_pago:fp, es_web:false, comentarios:coment||null,
    };
  }).filter(r=>r._barberoNombre||r.fecha);
}

function parseGastosRows(rows){
  const CATS=['Arriendo','Servicios básicos','Insumos y productos','Equipamiento','Marketing','Sueldos/Comisiones','Anticipos','Mantenimiento','Otro'];
  return rows.map((r,idx)=>{
    const fecha=pFecha(getCol(r,'Fecha','fecha'));
    const monto=pNum(getCol(r,'Monto','monto','importe'));
    const desc=getCol(r,'Descripcion','descripción','descripcion','detalle')||'';
    let cat=getCol(r,'Categoria','categoría','categoria')||'Otro';
    cat=CATS.find(c=>c.toLowerCase()===cat.toLowerCase())||'Otro';
    const fp=normalizeFP(getCol(r,'Forma de pago','forma pago','pago'));
    const errors=[];
    if(!fecha) errors.push('sin fecha');
    if(!monto) errors.push('sin monto');
    if(!desc) errors.push('sin descripción');
    return {
      _row:idx+2,_errors:errors,
      fecha,descripcion:desc,categoria:cat,monto,
      forma_pago:fp,
      notas:getCol(r,'Notas','notas','comentarios')||null,
    };
  }).filter(r=>r.fecha||r.monto);
}

function renderImportPreview(tipo){
  const sec=document.getElementById('importPreviewSection');
  sec.style.display='block';
  const total=importPreview.length;
  const errRows=importPreview.filter(r=>r._errors&&r._errors.length>0);
  const okRows=importPreview.filter(r=>!r._errors||r._errors.length===0);

  // Resolve barbero IDs
  if(tipo==='ventas'){
    importPreview.forEach(r=>{
      if(!r._barberoNombre) return;
      const b=barberos.find(b=>
        b.nombre.toUpperCase()===r._barberoNombre ||
        b.nombre.toUpperCase().replace(/\s+/g,' ')===r._barberoNombre.replace(/\s+/g,' ')
      );
      if(b){r.barbero_id=b.id;r.barbero_nombre=b.nombre;}
      else if(!r._errors.find(e=>e.startsWith('barbero'))) r._errors.push('barbero no encontrado: '+r._barberoNombre);
    });
  }

  document.getElementById('importStats').innerHTML=`
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <span class="badge badge-blue">📄 ${total} filas leídas</span>
      <span class="badge badge-green">✓ ${okRows.length} válidas</span>
      ${errRows.length?`<span class="badge badge-amber">⚠ ${errRows.length} con advertencias</span>`:''}
    </div>`;

  const preview=importPreview.slice(0,10);
  let tbl='';
  if(tipo==='ventas'){
    tbl=`<table><thead><tr><th>#</th><th>Fecha</th><th>Barbero</th><th>Tipo</th><th>Servicio/Producto</th><th>Monto</th><th>Propina</th><th>Total</th><th>Pago</th><th>Estado</th></tr></thead><tbody>
    ${preview.map(r=>`<tr style="${r._errors.length?'background:#FFFBEB':''}">
      <td style="color:#64748B">${r._row}</td>
      <td>${r.fecha||'—'}</td>
      <td>${r.barbero_nombre||r._barberoNombre||'—'}</td>
      <td><span class="badge ${r.tipo==='servicio'?'badge-blue':'badge-green'}">${r.tipo}</span></td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.servicio_producto}">${r.servicio_producto||'—'}</td>
      <td>${fmtCLP(r.monto)}</td><td>${fmtCLP(r.propina)}</td>
      <td><strong>${fmtCLP(r.total)}</strong></td>
      <td><span class="badge ${r.forma_pago==='EF'?'badge-green':r.forma_pago==='TK'?'badge-blue':r.forma_pago==='MP'?'badge-mp':'badge-purple'}">${r.forma_pago}</span></td>
      <td>${r._errors.length?`<span class="badge badge-amber" title="${r._errors.join(', ')}">⚠ ${r._errors[0]}</span>`:'<span class="badge badge-green">✓</span>'}</td>
    </tr>`).join('')}
    </tbody></table>`;
  } else {
    tbl=`<table><thead><tr><th>#</th><th>Fecha</th><th>Descripción</th><th>Categoría</th><th>Monto</th><th>Pago</th><th>Estado</th></tr></thead><tbody>
    ${preview.map(r=>`<tr style="${r._errors.length?'background:#FFFBEB':''}">
      <td style="color:#64748B">${r._row}</td>
      <td>${r.fecha||'—'}</td><td>${r.descripcion||'—'}</td>
      <td><span class="badge badge-amber">${r.categoria}</span></td>
      <td><strong>${fmtCLP(r.monto)}</strong></td><td>${r.forma_pago}</td>
      <td>${r._errors.length?`<span class="badge badge-amber">${r._errors[0]}</span>`:'<span class="badge badge-green">✓</span>'}</td>
    </tr>`).join('')}
    </tbody></table>`;
  }
  if(importPreview.length>10) tbl+=`<p style="color:#64748B;font-size:12px;margin-top:8px">... y ${importPreview.length-10} filas más no mostradas</p>`;
  document.getElementById('importPreviewTable').innerHTML=tbl;

  // Warnings box
  let warn='';
  if(tipo==='ventas'){
    const noB=importPreview.filter(r=>!r.barbero_id);
    if(noB.length){
      const noms=[...new Set(noB.map(r=>r._barberoNombre))].filter(Boolean);
      warn+=`<div style="background:#FEF3C7;border:1px solid #FCD34D;border-radius:6px;padding:10px;font-size:12px">
        <strong>⚠ Barberos no encontrados (${noB.length} filas):</strong> ${noms.join(', ')}<br>
        <span style="color:#64748B">Se importarán igual, sin asociar a barbero. Corrígelos después en Historial.</span>
      </div>`;
    }
  }
  document.getElementById('importWarnings').innerHTML=warn;

  const skip=importPreview.filter(r=>r._errors.includes('sin fecha')&&r._errors.includes('sin monto'));
  const toImport=total-skip.length;
  document.getElementById('importConfirmInfo').innerHTML=`
    Se importarán <strong>${toImport} registros</strong> de ${tipo}.
    ${skip.length?`<span style="color:var(--amber)"> (${skip.length} filas ignoradas por falta de fecha y monto)</span>`:''}
    <br><span style="color:#64748B;font-size:12px">⚠ Esta acción insertará los datos. Asegúrate de no duplicar importaciones del mismo período.</span>`;
}

async function confirmImport(){
  const tipo=document.getElementById('importTipo').value;
  const toInsert=importPreview.filter(r=>!(r._errors.includes('sin fecha')&&r._errors.includes('sin monto')));
  if(!toInsert.length){toast('No hay datos válidos','error');return;}
  if(!confirm(`¿Importar ${toInsert.length} registros de ${tipo}?`)) return;

  document.getElementById('importBtns').style.display='none';
  document.getElementById('importProgress').style.display='block';
  const fill=document.getElementById('importProgressFill');
  const txt=document.getElementById('importProgressText');

  const cleanRows=toInsert.map(r=>{
    const c={...r};
    delete c._row; delete c._errors; delete c._barberoNombre;
    Object.keys(c).forEach(k=>{if(c[k]===''||c[k]===undefined) c[k]=null;});
    return c;
  });

  const BATCH=50; let inserted=0, errs=0;
  for(let i=0;i<cleanRows.length;i+=BATCH){
    const batch=cleanRows.slice(i,i+BATCH);
    const {error}=tipo==='ventas'
      ?await sb.from('ventas').insert(batch)
      :await sb.from('gastos').insert(batch);
    if(error){errs+=batch.length;console.error(error);}
    else inserted+=batch.length;
    const pct=Math.round((i+batch.length)/cleanRows.length*100);
    fill.style.width=pct+'%';
    txt.textContent=`Procesando... ${i+batch.length} / ${cleanRows.length} (${pct}%)`;
    await new Promise(r=>setTimeout(r,30));
  }

  fill.style.width='100%';
  if(errs===0){
    txt.textContent=`✓ ¡Listo! ${inserted} registros importados correctamente.`;
    txt.style.color='var(--green)';
    toast(`✓ ${inserted} registros importados`);
  } else {
    txt.textContent=`Completado: ${inserted} OK · ${errs} con error`;
    txt.style.color='var(--amber)';
    toast(`${inserted} OK, ${errs} errores`,'error');
  }
  importPreview=[];
}

function cancelImport(){importPreview=[];loadImportar();}

// ============ ARQUEO DE CAJA ============
let arqueoFiltros = { anio: new Date().getFullYear(), mes: new Date().getMonth()+1 };
let arqueoSaldoInicial = 0;
let arqueoSaldoFinalReal = null;
let arqueoNotasFinal = '';

async function loadArqueo(){
  showOverlay();
  const [vRes, gRes, sRes] = await Promise.all([
    sb.rpc('get_ventas_ef'),
    sb.from('gastos').select('*').eq('forma_pago','EF').order('fecha').order('created_at').range(0,4999),
    sb.from('caja_saldo_inicial').select('*').eq('anio', arqueoFiltros.anio).eq('mes', arqueoFiltros.mes).maybeSingle(),
  ]);
  arqueoSaldoInicial = sRes.data?.monto || 0;
  arqueoSaldoFinalReal = sRes.data?.saldo_final_real ?? null;
  arqueoNotasFinal = sRes.data?.notas_final || '';
  hideOverlay();
  renderArqueo(vRes.data||[], gRes.data||[]);
}

function renderArqueo(ventas, gastos){
  const aniosV = ventas.map(v=>v.anio).filter(Boolean);
  const aniosG = gastos.map(g=>g.fecha?Number(g.fecha.split('-')[0]):null).filter(Boolean);
  const anios  = [...new Set([...aniosV,...aniosG])].sort((a,b)=>b-a);
  if(!anios.length) anios.push(new Date().getFullYear());
  if(!anios.includes(arqueoFiltros.anio)) arqueoFiltros.anio = anios[0];

  const vMes = ventas.filter(v=>v.anio==arqueoFiltros.anio && v.n_mes==arqueoFiltros.mes);
  const gMes = gastos.filter(g=>{
    if(!g.fecha) return false;
    const [y,m]=g.fecha.split('-');
    return Number(y)==arqueoFiltros.anio && Number(m)==arqueoFiltros.mes;
  });

  const totalEntradas = vMes.reduce((s,v)=>s+(v.total||0),0);
  const totalSalidas  = gMes.reduce((s,g)=>s+(g.monto||0),0);
  const saldoFinal    = arqueoSaldoInicial + totalEntradas - totalSalidas;

  const entradasSvc  = vMes.filter(v=>v.tipo==='servicio').reduce((s,v)=>s+(v.total||0),0);
  const entradasProd = vMes.filter(v=>v.tipo==='PRODUCTO').reduce((s,v)=>s+(v.total||0),0);
  const propinasEF   = vMes.reduce((s,v)=>s+(v.propina||0),0);

  const byCat={};
  gMes.forEach(g=>{ const c=g.categoria||'Otro'; byCat[c]=(byCat[c]||0)+(g.monto||0); });

  // Movimientos día a día
  const diasMap={};
  vMes.forEach(v=>{ if(!v.fecha) return; if(!diasMap[v.fecha]) diasMap[v.fecha]={e:[],s:[]}; diasMap[v.fecha].e.push(v); });
  gMes.forEach(g=>{ if(!g.fecha) return; if(!diasMap[g.fecha]) diasMap[g.fecha]={e:[],s:[]}; diasMap[g.fecha].s.push(g); });

  let acum = arqueoSaldoInicial;
  const diasConSaldo = Object.keys(diasMap).sort().map(fecha=>{
    const totalE = diasMap[fecha].e.reduce((s,v)=>s+(v.total||0),0);
    const totalS = diasMap[fecha].s.reduce((s,g)=>s+(g.monto||0),0);
    acum += totalE - totalS;
    return { fecha, e:diasMap[fecha].e, s:diasMap[fecha].s, totalE, totalS, saldoDia:totalE-totalS, saldoAcum:acum };
  });

  const anioOpts = anios.map(a=>`<option value="${a}" ${arqueoFiltros.anio==a?'selected':''}>${a}</option>`).join('');
  const mesOpts  = MESES.map((m,i)=>`<option value="${i+1}" ${arqueoFiltros.mes==i+1?'selected':''}>${m}</option>`).join('');

  document.getElementById('mainContent').innerHTML=`
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap">
    <span class="sec-title" style="margin:0">🏦 Arqueo de Caja — Efectivo</span>
    <select onchange="window._bridge.arqueoSetAnio(this.value)" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px">${anioOpts}</select>
    <select onchange="window._bridge.arqueoSetMes(this.value)" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px">${mesOpts}</select>
    <span style="font-size:12px;color:#64748B">${MESES[arqueoFiltros.mes-1]} ${arqueoFiltros.anio}</span>
    <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="arqueoExportCSV()">⬇ Exportar CSV</button>
  </div>

  <!-- Saldo inicial del mes -->
  <div class="section-card" style="margin-bottom:16px;border-left:4px solid var(--blue)">
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">

        <div style="font-size:22px;font-weight:700;color:var(--blue)">${fmtCLP(arqueoSaldoInicial)}</div>
        <div style="font-size:11px;color:#94A3B8">Efectivo en caja al inicio de ${MESES[arqueoFiltros.mes-1]}</div>
      </div>

async function saveSaldoFinal(){
  const val = document.getElementById('saldoFinalRealInput')?.value;
  if(val===''||val===null||val===undefined){ toast('Ingresa el conteo físico','error'); return; }
  const monto = Number(val);
  const notas = document.getElementById('saldoFinalNotas')?.value||null;
  showOverlay();

  // Verificar si ya existe el registro del mes
  const {data:existing} = await sb.from('caja_saldo_inicial')
    .select('id').eq('anio',arqueoFiltros.anio).eq('mes',arqueoFiltros.mes).maybeSingle();

  let error;
  if(existing){
    // Actualizar solo los campos del saldo final, sin tocar el saldo inicial
    ({error} = await sb.from('caja_saldo_inicial')
      .update({saldo_final_real:monto, notas_final:notas, updated_at:new Date().toISOString()})
      .eq('id', existing.id));
  } else {
    // Insertar fila nueva
    ({error} = await sb.from('caja_saldo_inicial')
      .insert({anio:arqueoFiltros.anio, mes:arqueoFiltros.mes, monto:0,
               saldo_final_real:monto, notas_final:notas, updated_at:new Date().toISOString()}));
  }

  hideOverlay();
  if(error){ toast('Error: '+error.message,'error'); return; }
  arqueoSaldoFinalReal = monto;
  arqueoNotasFinal = notas||'';
  toast(`✓ Conteo de ${MESES[arqueoFiltros.mes-1]} guardado: ${fmtCLP(monto)}`);
  loadArqueo();
}

async function propagarSiguienteMes(saldoFinal){
  const sigMes  = arqueoFiltros.mes===12 ? 1 : arqueoFiltros.mes+1;
  const sigAnio = arqueoFiltros.mes===12 ? arqueoFiltros.anio+1 : arqueoFiltros.anio;
  if(!confirm(`¿Usar ${fmtCLP(saldoFinal)} como saldo inicial de ${MESES[sigMes-1]} ${sigAnio}?`)) return;
  showOverlay();
  const {error} = await sb.from('caja_saldo_inicial')
    .upsert({anio:sigAnio, mes:sigMes, monto:saldoFinal, updated_at:new Date().toISOString()},
            {onConflict:'anio,mes'});
  hideOverlay();
  if(error){ toast('Error: '+error.message,'error'); return; }
  toast(`✓ Saldo inicial de ${MESES[sigMes-1]} ${sigAnio} establecido en ${fmtCLP(saldoFinal)}`);
  // Navegar al mes siguiente
  arqueoFiltros.mes = sigMes;
  arqueoFiltros.anio = sigAnio;
  loadArqueo();
}

async function saveSaldoInicial(){
  const monto = Number(document.getElementById('saldoInicialInput')?.value||0);
  const notas = document.getElementById('saldoInicialNotas')?.value||null;
  showOverlay();
  const {error} = await sb.from('caja_saldo_inicial')
    .upsert({anio:arqueoFiltros.anio, mes:arqueoFiltros.mes, monto, notas, updated_at:new Date().toISOString()},
            {onConflict:'anio,mes'});

  if(error){toast('Error: '+error.message,'error');return;}
  arqueoSaldoInicial = monto;
  toast(`✓ Saldo inicial de ${MESES[arqueoFiltros.mes-1]} guardado: ${fmtCLP(monto)}`);

}

function arqueoExportCSV(){
  Promise.all([
    sb.from('ventas').select('*').eq('forma_pago','EF').eq('anio',arqueoFiltros.anio).eq('n_mes',arqueoFiltros.mes).order('fecha'),
    sb.from('gastos').select('*').eq('forma_pago','EF').order('fecha'),
  ]).then(([vRes,gRes])=>{
    const vMes=vRes.data||[];
    const gMes=(gRes.data||[]).filter(g=>{
      if(!g.fecha) return false;
      const [y,m]=g.fecha.split('-');
      return Number(y)==arqueoFiltros.anio&&Number(m)==arqueoFiltros.mes;
    });
    const lines=[`Arqueo de Caja - ${MESES[arqueoFiltros.mes-1]} ${arqueoFiltros.anio}`,
      `Saldo Inicial;;${arqueoSaldoInicial}`,
      'Tipo;Fecha;Barbero/Descripcion;Detalle;Monto;Categoria'];
    vMes.forEach(v=>lines.push(`Entrada;${v.fecha};${v.barbero_nombre||''};${v.servicio_producto||''};${v.total||0};Venta EF`));
    gMes.forEach(g=>lines.push(`Salida;${g.fecha};;${g.descripcion||g.detalle||''};-${g.monto||0};${g.categoria||''}`));
    const totalE=vMes.reduce((s,v)=>s+(v.total||0),0);
    const totalS=gMes.reduce((s,g)=>s+(g.monto||0),0);
    lines.push(`;;Saldo Final;;${arqueoSaldoInicial+totalE-totalS};`);
    const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download=`arqueo_${MESES[arqueoFiltros.mes-1]}_${arqueoFiltros.anio}.csv`;a.click();
  });
}

function gcGenerarCodigo(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = 'GC-';
  for(let i=0;i<4;i++){
    for(let j=0;j<4;j++) code+=chars[Math.floor(Math.random()*chars.length)];
    if(i<3) code+='-';
  }
  return code;
}

function gcPreview(){
  const canvas=document.getElementById('gcCanvas'); if(!canvas) return;

  // Tamaño real de la card (proporción 16:9 landscape)
  const W=900, H=506;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  // =============================================
  // PANEL IZQUIERDO — simulación foto B&W
  // =============================================
  const splitX = 380;

  // Fondo oscuro B&W panel izquierdo
  const bgGrad=ctx.createLinearGradient(0,0,splitX,H);
  bgGrad.addColorStop(0,'#1a1a1a');
  bgGrad.addColorStop(0.4,'#2d2d2d');
  bgGrad.addColorStop(1,'#111111');
  ctx.fillStyle=bgGrad;
  ctx.fillRect(0,0,splitX,H);

  // Clip al panel izquierdo para decoraciones
  ctx.save();
  ctx.beginPath(); ctx.rect(0,0,splitX,H); ctx.clip();

  // Siluetas estilizadas de sillones de barbería (B&W)
  function drawChair(cx,cy,scale,alpha){
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.translate(cx,cy);
    ctx.scale(scale,scale);
    ctx.fillStyle='#888';
    // Base del sillón
    ctx.beginPath();ctx.roundRect(-30,30,60,15,4);ctx.fill();
    // Pata central
    ctx.fillRect(-6,45,12,30);
    // Base giratoria
    ctx.beginPath();ctx.ellipse(0,78,20,5,0,0,Math.PI*2);ctx.fill();
    // Asiento
    ctx.fillStyle='#555';
    ctx.beginPath();ctx.roundRect(-28,10,56,22,5);ctx.fill();
    // Respaldo
    ctx.fillStyle='#444';
    ctx.beginPath();ctx.roundRect(-24,-40,48,52,8);ctx.fill();
    // Cabecero
    ctx.fillStyle='#666';
    ctx.beginPath();ctx.roundRect(-18,-52,36,14,4);ctx.fill();
    // Brazos
    ctx.fillStyle='#555';
    ctx.beginPath();ctx.roundRect(-32,5,8,20,3);ctx.fill();
    ctx.beginPath();ctx.roundRect(24,5,8,20,3);ctx.fill();
    // Ribetes dorados sutiles
    ctx.strokeStyle='rgba(180,150,60,0.4)'; ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(-24,-40,48,52,8);ctx.stroke();
    ctx.restore();
  }

  drawChair(100,340,1.6,0.9);
  drawChair(240,360,1.4,0.75);
  drawChair(340,370,1.2,0.5);

  // Efecto techo con vigas
  ctx.fillStyle='rgba(50,50,50,0.8)';
  ctx.fillRect(0,0,splitX,60);
  for(let i=0;i<5;i++){
    ctx.fillStyle='rgba(80,80,80,0.6)';
    ctx.fillRect(i*80-10,0,12,60);
  }
  // Luces en techo
  [60,180,300].forEach(lx=>{
    const lg=ctx.createRadialGradient(lx,30,0,lx,30,40);
    lg.addColorStop(0,'rgba(255,255,220,0.25)');
    lg.addColorStop(1,'rgba(255,255,220,0)');
    ctx.fillStyle=lg;
    ctx.beginPath();ctx.arc(lx,30,40,0,Math.PI*2);ctx.fill();
  });

  // Overlay gradiente para integrar los dos paneles
  const overlayGrad=ctx.createLinearGradient(splitX-80,0,splitX,0);
  overlayGrad.addColorStop(0,'rgba(0,0,0,0)');
  overlayGrad.addColorStop(1,'rgba(0,0,0,1)');
  ctx.fillStyle=overlayGrad;
  ctx.fillRect(splitX-80,0,80,H);

  ctx.restore();

  // =============================================
  // PANEL DERECHO — negro con diseño Píston
  // =============================================
  ctx.fillStyle='#000000';
  ctx.fillRect(splitX,0,W-splitX,H);

  const RX=splitX+20; // margen izquierdo del panel derecho
  const RW=W-splitX-40; // ancho útil

  // --- LOGO PISTÓN ---
  // Nombre grande estilo display
  ctx.save();
  ctx.textAlign='center';
  const centerX=splitX+(W-splitX)/2;

  // "PISTÓN" grande
  ctx.fillStyle='#FFFFFF';
  ctx.font=`bold 68px "Georgia", serif`;
  ctx.letterSpacing='8px';
  ctx.fillText('PISTÓN', centerX, 105);
  ctx.letterSpacing='0px';

  // Líneas decorativas al costado de "BARBERIA"
  ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=0.8;
  const barbW=ctx.measureText('· BARBERIA ·').width;
  ctx.beginPath();ctx.moveTo(centerX-120,127);ctx.lineTo(centerX-55,127);ctx.stroke();
  ctx.beginPath();ctx.moveTo(centerX+55,127);ctx.lineTo(centerX+120,127);ctx.stroke();

  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.font='bold 13px "Segoe UI", sans-serif';
  ctx.letterSpacing='5px';
  ctx.fillText('· BARBERIA ·', centerX, 131);
  ctx.letterSpacing='0px';

  // --- "Gift Card" en script ---
  ctx.fillStyle='#FFFFFF';
  ctx.font=`italic bold 52px "Georgia", "Times New Roman", serif`;
  ctx.fillText('Gift Card', centerX, 200);

  // Línea decorativa separadora con ornamento
  const lineY=222;
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(RX,lineY);ctx.lineTo(W-20,lineY);ctx.stroke();
  // Ornamento central
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.font='14px serif';
  ctx.fillText('❖', centerX-6, lineY+4);

  ctx.restore();

  // --- CAMPOS NOMBRE y SERVICIO ---
  const fieldY1=255, fieldY2=320;
  const fieldX=RX+10;
  const fieldW=RW-20;
  const fieldH=36;

  function drawField(label, value, y){
    // Label
    ctx.fillStyle='#FFFFFF';
    ctx.font=`bold 13px "Georgia", serif`;
    ctx.letterSpacing='1px';
    ctx.fillText(label.toUpperCase()+':', fieldX, y-6);
    ctx.letterSpacing='0px';
    // Campo (rectángulo gris redondeado)
    ctx.fillStyle='rgba(140,140,140,0.55)';
    ctx.beginPath(); ctx.roundRect(fieldX, y, fieldW, fieldH, 18); ctx.fill();
    // Valor dentro del campo
    if(value){
      ctx.fillStyle='#FFFFFF';
      ctx.font=`bold 16px "Segoe UI", sans-serif`;
      ctx.textAlign='left';
      // Truncate if too long
      let txt=value;
      while(ctx.measureText(txt).width > fieldW-24 && txt.length>1) txt=txt.slice(0,-1)+'…';
      ctx.fillText(txt, fieldX+16, y+24);
    }
  }

  ctx.textAlign='left';
  const nombre  = document.getElementById('gcNombre')?.value||'';
  const servicio= gcGetServicio();
  drawField('Nombre',  nombre,   fieldY1);
  drawField('Servicio', servicio, fieldY2);

  // --- FOOTER con info de contacto ---
  const footerY=H-50;
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.fillRect(splitX, footerY-10, W-splitX, H-(footerY-10));

  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.font='11px "Segoe UI", sans-serif';
  ctx.textAlign='left';

  // Instagram
  ctx.fillText('📷', RX, footerY+16);
  ctx.fillText('@piston.barberia', RX+18, footerY+16);
  // WhatsApp
  const wp=RX+145;
  ctx.fillText('💬', wp, footerY+16);
  ctx.fillText('+56 9 3083 3374', wp+18, footerY+16);
  // Dirección
  const loc=wp+145;
  ctx.fillText('📍', loc, footerY+16);
  ctx.fillText('Av. Consistorial 2590, Peñalolén', loc+18, footerY+16);

  // Código y vencimiento en footer
  const cod=document.getElementById('gcCodigo')?.value||'';
  const venc=document.getElementById('gcVencimiento')?.value;
  if(cod){
    ctx.textAlign='right';
    ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.font='9px "Courier New", monospace';
    ctx.fillText(cod, W-20, footerY+8);
    if(venc){
      const d=new Date(venc+'T12:00:00');
      ctx.fillText('Válida hasta: '+d.toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'}), W-20, footerY+20);
    }
    ctx.textAlign='left';
  }
}

function gcGetServicio(){
  const sel=document.getElementById('gcServicio');
  if(!sel) return '';
  if(sel.value==='__custom__') return document.getElementById('gcServicioCustom')?.value||'';
  return sel.value;
}

async function gcSave(){
  const nombre = document.getElementById('gcNombre')?.value?.trim();
  const servicio = gcGetServicio();
  const codigo  = document.getElementById('gcCodigo')?.value?.trim();
  if(!nombre){toast('Ingresa el nombre del destinatario','error');return;}
  if(!servicio){toast('Selecciona el servicio','error');return;}
  if(!codigo){toast('Genera un código','error');return;}
  const obj={
    codigo, destinatario:nombre, servicio, mensaje:servicio, monto:0,
    fecha_vencimiento:document.getElementById('gcVencimiento')?.value||null,
    fecha_emision:today(), estado:'activa',
  };
  showOverlay();
  const {error}=await sb.from('gift_cards').insert(obj);
  hideOverlay();
  if(error){ if(error.message.includes('unique')) toast('Código duplicado, genera uno nuevo','error'); else toast('Error: '+error.message,'error'); return; }
  toast('✓ Gift card guardada');
  gcPreview();
  setTimeout(()=>gcDescargarPNG(false),100);
  loadGiftCards();
}

function gcDescargarPNG(standalone=true){
  const canvas=document.getElementById('gcCanvas');
  if(!canvas){if(standalone)toast('Genera una vista previa primero','error');return;}
  gcPreview();
  const codigo=document.getElementById('gcCodigo')?.value||'giftcard';
  const link=document.createElement('a');
  link.download=`GiftCard_Piston_${codigo}.png`;
  link.href=canvas.toDataURL('image/png',1.0);
  link.click();
  if(standalone) toast('✓ PNG descargado');
}

async function gcDescargarPDF(){
  const canvas=document.getElementById('gcCanvas');
  if(!canvas){toast('Genera una vista previa primero','error');return;}
  gcPreview();
  if(!window.jspdf){
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      s.onload=res; s.onerror=rej; document.head.appendChild(s);
    });
  }
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:'landscape',unit:'px',format:[900,506],hotfixes:['px_scaling']});
  pdf.addImage(canvas.toDataURL('image/png',1.0),'PNG',0,0,900,506);
  const codigo=document.getElementById('gcCodigo')?.value||'giftcard';
  pdf.save(`GiftCard_Piston_${codigo}.pdf`);
  toast('✓ PDF descargado');
}

let analisisFiltros = { anio: new Date().getFullYear(), mes: 0 };

async function loadAnalisis(){
  showOverlay();
  const {data:ventasJson} = await sb.rpc('get_ventas_anio_json', {p_anio: analisisFiltros.anio});
  const ventas = ventasJson || [];

function normDiaA(d){
  if(!d) return null;
  const s=String(d).trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  return {lunes:'Lunes',martes:'Martes',miercoles:'Miércoles',jueves:'Jueves',viernes:'Viernes',sabado:'Sábado',domingo:'Domingo'}[s]||null;
}

function barH(val, max, color, height='18px'){
  const w=Math.round(val/max*100);
  return `<div style="flex:1;height:${height};background:#F1F5F9;border-radius:4px;overflow:hidden">
    <div style="height:100%;width:${w}%;background:${color};border-radius:4px;transition:.4s"></div>
  </div>`;
}

function renderAnalisis(ventasAll){
  // Filtrar por mes si aplica
  const ventas = analisisFiltros.mes>0
    ? ventasAll.filter(v=>v.n_mes==analisisFiltros.mes)
    : ventasAll;

  const anios=[...new Set(ventasAll.map(v=>v.anio).filter(Boolean))].sort((a,b)=>b-a);
  const anioOpts=anios.map(a=>`<option value="${a}" ${analisisFiltros.anio==a?'selected':''}>${a}</option>`).join('');
  const mesOpts=MESES.map((m,i)=>`<option value="${i+1}" ${analisisFiltros.mes==i+1?'selected':''}>${m}</option>`).join('');

  // ── 1. Día de semana ──────────────────────────────────────────────────────
  const diasOrden=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
  const coloresDia=['#6366F1','#EC4899','#F59E0B','#10B981','#3B82F6','#1E6FD9','#8B5CF6'];
  const byDia={};
  diasOrden.forEach(d=>{ byDia[d]={total:0,count:0,fechas:new Set()}; });
  ventas.forEach(v=>{
    const d=normDiaA(v.dia_semana); if(!d) return;
    byDia[d].total+=(v.total||0); byDia[d].count++;
    if(v.fecha) byDia[d].fechas.add(v.fecha);
  });
  diasOrden.forEach(d=>{
    byDia[d].promedio=Math.round(byDia[d].total/(byDia[d].fechas.size||1));
    byDia[d].dias=byDia[d].fechas.size;
  });
  const maxProm=Math.max(...diasOrden.map(d=>byDia[d].promedio),1);
  const maxDiaTotal=Math.max(...diasOrden.map(d=>byDia[d].total),1);
  const rankingDia=[...diasOrden].sort((a,b)=>byDia[b].promedio-byDia[a].promedio);

  // ── 2. Evolución mensual ──────────────────────────────────────────────────
  const byMes={};
  MESES.forEach((m,i)=>{ byMes[i+1]={nombre:m,total:0,count:0}; });
  ventasAll.forEach(v=>{ if(v.n_mes) { byMes[v.n_mes].total+=(v.total||0); byMes[v.n_mes].count++; } });
  const mesesConDatos=Object.values(byMes).filter(m=>m.total>0);
  const maxMes=Math.max(...mesesConDatos.map(m=>m.total),1);

  // ── 3. Ranking servicios ──────────────────────────────────────────────────
  const bySvc={};
  ventas.filter(v=>v.tipo==='servicio').forEach(v=>{
    const s=v.servicio_producto||'Otro';
    if(!bySvc[s]) bySvc[s]={total:0,count:0};
    bySvc[s].total+=(v.monto||0); bySvc[s].count++;
  });
  const topSvc=Object.entries(bySvc).sort((a,b)=>b[1].count-a[1].count).slice(0,10);
  const maxSvc=Math.max(...topSvc.map(([,d])=>d.count),1);

  // ── 4. Ticket promedio por barbero ────────────────────────────────────────
  const byBarb={};
  ventas.filter(v=>v.tipo==='servicio'&&!String(v.barbero_nombre||'').toUpperCase().includes('PISTON'))
    .forEach(v=>{
      const n=v.barbero_nombre||'?';
      if(!byBarb[n]) byBarb[n]={total:0,count:0,propinas:0};
      byBarb[n].total+=(v.monto||0); byBarb[n].count++; byBarb[n].propinas+=(v.propina||0);
    });
  Object.keys(byBarb).forEach(k=>{ byBarb[k].ticket=Math.round(byBarb[k].total/(byBarb[k].count||1)); });
  const topBarb=Object.entries(byBarb).sort((a,b)=>b[1].ticket-a[1].ticket);
  const maxTicket=Math.max(...topBarb.map(([,d])=>d.ticket),1);
  const coloresBarb=['#1E6FD9','#10B981','#F59E0B','#EC4899','#8B5CF6','#6366F1','#EF4444'];

  // ── 5. Propinas por barbero ───────────────────────────────────────────────
  const topPropinas=Object.entries(byBarb).sort((a,b)=>b[1].propinas-a[1].propinas);
  const maxPropina=Math.max(...topPropinas.map(([,d])=>d.propinas),1);

  // ── 6. Forma de pago ─────────────────────────────────────────────────────
  const byPago={EF:0,TK:0,TRF:0,MP:0};
  ventas.forEach(v=>{ if(byPago[v.forma_pago]!==undefined) byPago[v.forma_pago]+=(v.total||0); });
  const totalPago=Object.values(byPago).reduce((s,v)=>s+v,0)||1;

  // ── 7. Clientes más frecuentes ────────────────────────────────────────────
  const byCli={};
  ventas.filter(v=>v.cliente&&v.cliente.trim()&&v.cliente.trim().toUpperCase()!=='CLIENTE CLIENTE').forEach(v=>{
    const c=v.cliente.trim().toUpperCase();
    if(!byCli[c]) byCli[c]={count:0,total:0};
    byCli[c].count++; byCli[c].total+=(v.total||0);
  });
  const topCli=Object.entries(byCli).sort((a,b)=>b[1].count-a[1].count).slice(0,8);
  const maxCli=Math.max(...topCli.map(([,d])=>d.count),1);

  document.getElementById('mainContent').innerHTML=`
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap">
    <span class="sec-title" style="margin:0">📈 Análisis</span>
    <select onchange="window._bridge.analisisSetAnio(this.value)" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px">${anioOpts}</select>
    <select onchange="window._bridge.analisisSetMes(this.value)" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px">
      <option value="0" ${analisisFiltros.mes==0?'selected':''}>Año completo</option>${mesOpts}
    </select>
    <span style="font-size:12px;color:#64748B">${analisisFiltros.mes>0?MESES[analisisFiltros.mes-1]+' ':''} ${analisisFiltros.anio} · ${ventas.length} transacciones</span>
  </div>

  <!-- Fila 1: Evolución mensual + Forma de pago -->
  <div class="grid-2" style="margin-bottom:16px">
    <div class="card">
      <div class="card-title">Evolución Mensual ${analisisFiltros.anio}</div>
      ${mesesConDatos.length===0?'<p style="color:#64748B;font-size:12px">Sin datos</p>':
        Object.values(byMes).filter(m=>m.total>0).map((m,i)=>`
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
          <div style="width:70px;font-size:11px;font-weight:500;color:#374151;text-align:right;flex-shrink:0">${m.nombre.slice(0,3)}</div>
          ${barH(m.total,maxMes,'#1E6FD9')}
          <div style="width:90px;font-size:12px;font-weight:700;flex-shrink:0">${fmtCLP(m.total)}</div>
          <div style="width:40px;font-size:10px;color:#94A3B8;flex-shrink:0">${m.count}t</div>
        </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Distribución por Forma de Pago</div>
      ${Object.entries(byPago).map(([k,v])=>{
        const pct=Math.round(v/totalPago*100);
        const col={EF:'#15803D',TK:'#1E6FD9',TRF:'#6D28D9',MP:'#0369A1'}[k]||'#64748B';
        return `<div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:12px;font-weight:600">${k}</span>
            <span style="font-size:12px;color:#64748B">${fmtCLP(v)} · <strong>${pct}%</strong></span>
          </div>
          <div style="height:10px;background:#F1F5F9;border-radius:99px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:${col};border-radius:99px;transition:.4s"></div>
          </div>
        </div>`;
      }).join('')}
      <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border);font-size:13px;font-weight:700;display:flex;justify-content:space-between">
        <span>Total</span><span>${fmtCLP(totalPago)}</span>
      </div>
    </div>
  </div>

  <!-- Fila 2: Día de semana -->
  <div class="card" style="margin-bottom:16px">
    <div class="card-title">Ventas por Día de la Semana</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
      <div>
        <div style="font-size:11px;font-weight:600;color:#64748B;margin-bottom:10px;text-transform:uppercase">Promedio por día (días con atención)</div>
        ${diasOrden.map((d,i)=>`
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
          <div style="width:82px;font-size:12px;font-weight:500;text-align:right;flex-shrink:0">${d}</div>
          ${barH(byDia[d].promedio,maxProm,coloresDia[i])}
          <div style="width:88px;font-size:12px;font-weight:700;flex-shrink:0">${fmtCLP(byDia[d].promedio)}</div>
          <div style="width:36px;font-size:10px;color:#94A3B8;flex-shrink:0">${byDia[d].dias}d</div>
        </div>`).join('')}
      </div>
      <div>
        <div style="font-size:11px;font-weight:600;color:#64748B;margin-bottom:10px;text-transform:uppercase">Total acumulado + transacciones</div>
        ${diasOrden.map((d,i)=>`
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
          <div style="width:82px;font-size:12px;font-weight:500;text-align:right;flex-shrink:0">${d}</div>
          ${barH(byDia[d].total,maxDiaTotal,coloresDia[i])}
          <div style="width:88px;font-size:12px;font-weight:700;flex-shrink:0">${fmtCLP(byDia[d].total)}</div>
          <div style="width:36px;font-size:10px;color:#94A3B8;flex-shrink:0">${byDia[d].count}t</div>
        </div>`).join('')}
        <div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;padding-top:10px;border-top:1px solid var(--border)">
          ${rankingDia.map((d,i)=>`<span style="padding:3px 8px;background:${i===0?'#FEF3C7':i===1?'#F1F5F9':'#F8FAFC'};border-radius:99px;font-size:11px;font-weight:600;color:${i===0?'#B45309':'#475569'}">${['🥇','🥈','🥉'][i]||String(i+1)+'.'} ${d}</span>`).join('')}
        </div>
      </div>
    </div>
  </div>

  <!-- Fila 3: Top servicios + Ticket promedio barbero -->
  <div class="grid-2" style="margin-bottom:16px">
    <div class="card">
      <div class="card-title">Top 10 Servicios más Vendidos</div>
      ${topSvc.length===0?'<p style="color:#64748B;font-size:12px">Sin datos</p>':
        topSvc.map(([nombre,d],i)=>`
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
          <div style="width:16px;font-size:10px;color:#94A3B8;text-align:right;flex-shrink:0">${i+1}</div>
          <div style="min-width:0;flex:2;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${nombre}">${nombre}</div>
          ${barH(d.count,maxSvc,'#10B981','16px')}
          <div style="width:32px;font-size:12px;font-weight:700;color:#10B981;flex-shrink:0;text-align:right">${d.count}</div>
          <div style="width:76px;font-size:11px;color:#64748B;flex-shrink:0;text-align:right">${fmtCLP(d.total)}</div>
        </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Ticket Promedio por Barbero</div>
      ${topBarb.length===0?'<p style="color:#64748B;font-size:12px">Sin datos</p>':
        topBarb.map(([nombre,d],i)=>`
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <div style="width:70px;font-size:12px;font-weight:600;text-align:right;flex-shrink:0">${nombre.split(' ')[0]}</div>
          ${barH(d.ticket,maxTicket,coloresBarb[i%coloresBarb.length])}
          <div style="width:80px;font-size:12px;font-weight:700;flex-shrink:0">${fmtCLP(d.ticket)}</div>
          <div style="width:40px;font-size:10px;color:#94A3B8;flex-shrink:0">${d.count}t</div>
        </div>`).join('')}
    </div>
  </div>

  <!-- Fila 4: Propinas + Clientes frecuentes -->
  <div class="grid-2" style="margin-bottom:16px">
    <div class="card">
      <div class="card-title">Propinas por Barbero</div>
      ${topPropinas.length===0?'<p style="color:#64748B;font-size:12px">Sin datos</p>':
        topPropinas.map(([nombre,d],i)=>`
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <div style="width:70px;font-size:12px;font-weight:600;text-align:right;flex-shrink:0">${nombre.split(' ')[0]}</div>
          ${barH(d.propinas,maxPropina,coloresBarb[i%coloresBarb.length])}
          <div style="width:80px;font-size:12px;font-weight:700;color:var(--blue);flex-shrink:0">${fmtCLP(d.propinas)}</div>
          <div style="width:72px;font-size:10px;color:#94A3B8;flex-shrink:0">${d.count>0?fmtCLP(Math.round(d.propinas/d.count))+'/t':''}</div>
        </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Clientes más Frecuentes</div>
      ${topCli.length===0?'<p style="color:#64748B;font-size:12px">Sin clientes registrados</p>':
        topCli.map(([nombre,d],i)=>`
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
          <div style="width:16px;font-size:10px;color:#94A3B8;text-align:right;flex-shrink:0">${i+1}</div>
          <div style="min-width:0;flex:2;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${nombre}">${nombre}</div>
          ${barH(d.count,maxCli,'#8B5CF6','16px')}
          <div style="width:28px;font-size:12px;font-weight:700;color:#8B5CF6;flex-shrink:0">${d.count}</div>
          <div style="width:80px;font-size:11px;color:#64748B;flex-shrink:0;text-align:right">${fmtCLP(d.total)}</div>
        </div>`).join('')}
    </div>
  </div>
  `;

  window._bridge.analisisSetAnio = v=>{ analisisFiltros.anio=Number(v); loadAnalisis(); };
  window._bridge.analisisSetMes  = v=>{ analisisFiltros.mes=Number(v);  loadAnalisis(); };
}

  const [vRes, gRes, aRes] = await Promise.all([
    sb.rpc('get_ventas_anio_json', {p_anio: liqFiltros.anio}),
    sb.from('gastos').select('*').eq('categoria','Adelantos').range(0,4999),
    sb.from('adelantos_santander').select('*').eq('anio', liqFiltros.anio).order('mes').order('barbero_nombre'),
  ]);
  liqVentas = vRes.data||[];
  liqGastos = gRes.data||[];
  liqAdelantosSantander = aRes.data||[];
  hideOverlay();
  renderLiquidacion();
}

function renderLiquidacion(){
  const vMes = liqVentas.filter(v=>v.n_mes==liqFiltros.mes);
  const gMes = liqGastos.filter(g=>g.fecha&&Number(g.fecha.split('-')[0])==liqFiltros.anio&&Number(g.fecha.split('-')[1])==liqFiltros.mes);
  const aMes = liqAdelantosSantander.filter(a=>a.mes==liqFiltros.mes);

  // Barberos activos en el mes (sin PISTON)
  const barbNombres = [...new Set(vMes.map(v=>v.barbero_nombre).filter(n=>n&&!n.toUpperCase().includes('PISTON')))].sort();

  const anios = [...new Set(liqVentas.map(v=>v.anio).filter(Boolean))].sort((a,b)=>b-a);
  const anioOpts = anios.map(a=>`<option value="${a}" ${liqFiltros.anio==a?'selected':''}>${a}</option>`).join('');
  const mesOpts  = MESES.map((m,i)=>`<option value="${i+1}" ${liqFiltros.mes==i+1?'selected':''}>${m}</option>`).join('');

  // Calcular por barbero
  const rows = barbNombres.map(nombre=>{
    const svc=servicios.find(s=>s.nombre);
    const pct = (barberos.find(b=>b.nombre===nombre)?.comision||50)/100;

    const vBarb = vMes.filter(v=>v.barbero_nombre===nombre);

    // SANTANDER (TK + TRF)
    const vSant = vBarb.filter(v=>v.tipo==='servicio'&&['TK','TRF'].includes(v.forma_pago));
    const montoSant  = vSant.reduce((s,v)=>s+(v.monto||0),0);
    const comSant    = Math.round(vSant.reduce((s,v)=>{
      const svcPct=(servicios.find(sx=>sx.nombre===v.servicio_producto)?.comision||50)/100;
      return s+(v.monto||0)*svcPct;
    },0));
    const propSant   = vSant.reduce((s,v)=>s+(v.propina||0),0);
    const adelSant   = aMes.filter(a=>a.barbero_nombre===nombre).reduce((s,a)=>s+a.monto,0);
    const totalSant  = comSant + propSant - adelSant;

    // FALABELLA (EF)
    const vFall = vBarb.filter(v=>v.tipo==='servicio'&&v.forma_pago==='EF');
    const montoFall  = vFall.reduce((s,v)=>s+(v.monto||0),0);
    const comFall    = Math.round(vFall.reduce((s,v)=>{
      const svcPct=(servicios.find(sx=>sx.nombre===v.servicio_producto)?.comision||50)/100;
      return s+(v.monto||0)*svcPct;
    },0));
    const propFall   = vFall.reduce((s,v)=>s+(v.propina||0),0);
    // Comisión productos (10%) — todos los pagos
    const comProd    = Math.round(vBarb.filter(v=>v.tipo==='PRODUCTO').reduce((s,v)=>s+(v.monto||0)*0.1,0));
    const totalFall  = comFall + propFall + comProd;
    // Adelantos EF desde gastos
    const adelFall   = gMes.filter(g=>g.barbero_nombre===nombre).reduce((s,g)=>s+g.monto,0);
    const transferFall = totalFall - adelFall;

    const totalBarbero = totalSant + totalFall;

    return { nombre, pct,
      montoSant, comSant, propSant, adelSant, totalSant,
      montoFall, comFall, propFall, comProd, totalFall, adelFall, transferFall,
      totalBarbero };
  });

    propFall:acc.propFall+r.propFall, comProd:acc.comProd+r.comProd, totalFall:acc.totalFall+r.totalFall,
    adelFall:acc.adelFall+r.adelFall, transferFall:acc.transferFall+r.transferFall,
    totalBarbero:acc.totalBarbero+r.totalBarbero

async function generarPDFBarbero(nombre, row) {
  // Cargar jsPDF + autoTable si no están
  if(!window.jspdf){
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      s.onload=res; s.onerror=rej; document.head.appendChild(s);
    });
  }
  await new Promise((res,rej)=>{
    if(typeof window.jspdf?.jsPDF?.prototype?.autoTable !== 'undefined'){ res(); return; }
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js';
    s.onload=res; s.onerror=rej; document.head.appendChild(s);
  });

  toast('Generando PDF...','info');
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
  const PW = 210, PH = 297, M = 14;
  let y = M;

  const CLR_RED=[220,38,38], CLR_GREEN=[22,163,74], CLR_NAVY=[30,58,95];
  const CLR_LGRAY=[241,245,249], CLR_DKGRAY=[100,116,139];
  const fCLP = n => n==null ? '—' : '$'+Math.round(n).toLocaleString('es-CL');
  const mesNombre = MESES[liqFiltros.mes-1];
  const periodoStr = `1 al ${new Date(liqFiltros.anio, liqFiltros.mes, 0).getDate()} de ${mesNombre} ${liqFiltros.anio}`;

  // ─── ENCABEZADO ───────────────────────────────────────────────────────────
  // Logo
  try { doc.addImage(LOGO_B64,'JPEG', M, y, 40, 22); } catch(e){}
  // Título derecha
  doc.setFontSize(18).setFont(undefined,'bold').setTextColor(...CLR_NAVY);
  doc.text('PÍSTON BARBERÍA', PW-M, y+8, {align:'right'});
  doc.setFontSize(10).setFont(undefined,'normal').setTextColor(...CLR_DKGRAY);
  doc.text('Liquidación de Pagos', PW-M, y+14, {align:'right'});
  doc.text(periodoStr, PW-M, y+19, {align:'right'});
  y += 28;

  // Línea divisoria
  doc.setDrawColor(...CLR_NAVY).setLineWidth(0.5).line(M, y, PW-M, y);
  y += 7;

  // Nombre barbero
  doc.setFontSize(16).setFont(undefined,'bold').setTextColor(...CLR_NAVY);
  doc.text(nombre, M, y);
  doc.setFontSize(10).setFont(undefined,'normal').setTextColor(...CLR_DKGRAY);
  doc.text('Barbero · Píston Barbería', M, y+5);

function exportLiqCSV(){
  const vMes = liqVentas.filter(v=>v.n_mes==liqFiltros.mes);
  const gMes = liqGastos.filter(g=>g.fecha&&Number(g.fecha.split('-')[0])==liqFiltros.anio&&Number(g.fecha.split('-')[1])==liqFiltros.mes);
  const aMes = liqAdelantosSantander.filter(a=>a.mes==liqFiltros.mes);
  const barbNombres = [...new Set(vMes.map(v=>v.barbero_nombre).filter(n=>n&&!n.toUpperCase().includes('PISTON')))].sort();
  const hdr='Mes;Barbero;Con Boleta;Com.Santander;Propina Sant;Subtotal Sant;Total Transf Santander;Adelanto TRF;Sin Boleta;Com.Falabella;Propina Fall;Com.Productos;Adelanto EF;Total Transf Falabella;TOTAL';
  const lines=[`Liquidación ${MESES[liqFiltros.mes-1]} ${liqFiltros.anio}`,hdr];
  barbNombres.forEach(nombre=>{
    const vBarb=vMes.filter(v=>v.barbero_nombre===nombre);
    const vSant=vBarb.filter(v=>v.tipo==='servicio'&&['TK','TRF'].includes(v.forma_pago));
    const montoSant=vSant.reduce((s,v)=>s+(v.monto||0),0);
    const comSant=Math.round(vSant.reduce((s,v)=>{const p=(servicios.find(sx=>sx.nombre===v.servicio_producto)?.comision||50)/100;return s+(v.monto||0)*p;},0));
    const propSant=vSant.reduce((s,v)=>s+(v.propina||0),0);
    const adelSant=aMes.filter(a=>a.barbero_nombre===nombre).reduce((s,a)=>s+a.monto,0);
    const vFall=vBarb.filter(v=>v.tipo==='servicio'&&v.forma_pago==='EF');
    const montoFall=vFall.reduce((s,v)=>s+(v.monto||0),0);
    const comFall=Math.round(vFall.reduce((s,v)=>{const p=(servicios.find(sx=>sx.nombre===v.servicio_producto)?.comision||50)/100;return s+(v.monto||0)*p;},0));
    const propFall=vFall.reduce((s,v)=>s+(v.propina||0),0);
    const comProd=Math.round(vBarb.filter(v=>v.tipo==='PRODUCTO').reduce((s,v)=>s+(v.monto||0)*0.1,0));
    const adelFall=gMes.filter(g=>g.barbero_nombre===nombre).reduce((s,g)=>s+g.monto,0);
    const totalSant=comSant+propSant-adelSant;
    const totalFall=comFall+propFall+comProd-adelFall;
    lines.push([MESES[liqFiltros.mes-1],nombre,montoSant,comSant,propSant,comSant+propSant,totalSant,adelSant,montoFall,comFall,propFall,comProd,adelFall,totalFall,totalSant+totalFall].join(';'));
  });
  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`liquidacion_${MESES[liqFiltros.mes-1]}_${liqFiltros.anio}.csv`;a.click();
}
