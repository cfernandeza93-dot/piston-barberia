<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pistón Barbería</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;font-size:13px;background:#F8FAFC;color:#1E293B}
:root{--blue:#1E6FD9;--green:#15803D;--red:#DC2626;--amber:#B45309;--border:#E2E8F0;--card:#fff;--text:#1E293B;--muted:#64748B}
/* LOGIN */
#loginScreen{position:fixed;inset:0;background:#1E293B;display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#fff;border-radius:16px;padding:40px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h1{font-size:24px;font-weight:700;color:#1E293B;margin-bottom:4px}
.login-box p{color:#64748B;margin-bottom:24px;font-size:13px}
.login-box input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:var(--blue)}
.login-box button{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.login-box .err{color:var(--red);font-size:12px;margin-top:8px}
/* LAYOUT */
#app{display:none;flex-direction:column;height:100vh}
.topbar{background:#1E293B;color:#fff;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-weight:700;font-size:16px;letter-spacing:.5px}
.topbar-subtitle{font-size:11px;color:#94A3B8}
.tabs{background:#fff;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;flex-shrink:0;padding:0 16px}
.tab-btn{padding:12px 16px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:500;color:#64748B;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-btn:hover{color:#1E293B}
.content{flex:1;overflow-y:auto;padding:20px}
/* CARDS */
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px}
.card-title{font-size:12px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
/* METRICS */
.metric{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px}
.metric-label{font-size:11px;color:#64748B;font-weight:500;margin-bottom:6px}
.metric-value{font-size:24px;font-weight:700;color:#1E293B}
.metric-sub{font-size:11px;color:#64748B;margin-top:4px}
/* TABLES */
table{width:100%;border-collapse:collapse}
th{padding:8px 10px;text-align:left;font-size:11px;font-weight:600;color:#64748B;border-bottom:1px solid var(--border);background:#F8FAFC}
td{padding:8px 10px;font-size:12px;border-bottom:1px solid #F1F5F9;vertical-align:middle}
tr:hover td{background:#F8FAFC}
/* FORMS */
.form-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px}
.form-group label{font-size:11px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none;background:#fff;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue)}
/* BUTTONS */
.btn{padding:8px 14px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#1558b0}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-ghost{background:#F1F5F9;color:#374151;border:1px solid var(--border)}
.btn-ghost:hover{background:#E2E8F0}
.btn-sm{padding:5px 10px;font-size:11px}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge-blue{background:#DBEAFE;color:#1D4ED8}
.badge-green{background:#DCFCE7;color:#15803D}
.badge-red{background:#FEE2E2;color:#DC2626}
.badge-amber{background:#FEF3C7;color:#B45309}
.badge-gray{background:#F1F5F9;color:#475569}
.badge-purple{background:#EDE9FE;color:#6D28D9}
/* PROGRESS BAR */
.progress-bar{height:6px;background:#E2E8F0;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:.3s}
/* OVERLAY */
#overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:8000;display:none;align-items:center;justify-content:center}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* TOAST */
#toast-container{position:fixed;bottom:20px;right:20px;z-index:9998;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;color:#fff;max-width:320px;animation:slideIn .2s ease;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast-success{background:#15803D}
.toast-error{background:#DC2626}
.toast-info{background:#1E6FD9}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
/* FILTERS */
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px}
.filters select,.filters input{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:#fff}
/* INLINE EDIT */
.edit-cell{display:none}
.edit-cell input,.edit-cell select{width:100%;padding:4px 6px;border:1px solid var(--blue);border-radius:4px;font-size:12px}
.row-editing .view-cell{display:none}
.row-editing .edit-cell{display:block}
/* BAR CHART */
.bar-chart-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-chart-label{width:140px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right}
.bar-chart-bar{flex:1;height:18px;background:#E2E8F0;border-radius:4px;overflow:hidden}
.bar-chart-fill{height:100%;background:var(--blue);border-radius:4px;transition:.5s}
.bar-chart-val{width:80px;font-size:12px;font-weight:600;color:#1E293B}
/* SECTION TITLE */
.sec-title{font-size:15px;font-weight:700;color:#1E293B;margin-bottom:16px}
/* RESPONSIVE */
@media(max-width:768px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr 1fr}.grid-2{grid-template-columns:1fr}}
/* CARRITO */
.cart-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#F8FAFC;border-radius:6px;margin-bottom:6px;border:1px solid var(--border)}
/* CONCILIACION */
.concil-match{background:#DCFCE7}
.concil-diff{background:#FEF3C7}
.concil-missing{background:#FEE2E2}
/* MODAL-LIKE SECTION */
.section-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>✂ Pistón Barbería</h1>
    <p>Sistema de gestión interno</p>
    <input type="password" id="pwInput" placeholder="Contraseña de acceso" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">Ingresar</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay"><div class="spinner"></div></div>
<div id="toast-container"></div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div>
      <div class="topbar-title">✂ PISTÓN BARBERÍA</div>
      <div class="topbar-subtitle">Sistema de Gestión</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="topbarDate" style="font-size:11px;color:#94A3B8"></span>
    </div>
  </div>
  <div class="tabs" id="tabBar">
    <button class="tab-btn active" onclick="go('dashboard')">📊 Dashboard</button>
    <button class="tab-btn" onclick="go('venta')">➕ Nueva Venta</button>
    <button class="tab-btn" onclick="go('historial')">📋 Historial</button>
    <button class="tab-btn" onclick="go('inventario')">📦 Inventario</button>
    <button class="tab-btn" onclick="go('gastos')">💸 Gastos</button>
    <button class="tab-btn" onclick="go('conciliacion')">🔄 Conciliación</button>
    <button class="tab-btn" onclick="go('equipo')">👥 Equipo</button>
    <button class="tab-btn" onclick="go('importar')">📥 Importar</button>
  </div>
  <div class="content" id="mainContent"></div>
</div>

<!-- BRIDGE -->
<script>
window._bridge = {};
['checkPw','go','dshTab','loadDashboard','loadVenta','loadHistorial','loadInventario','loadGastos','loadConciliacion','loadEquipo','loadImportar',
 'submitVenta','addCartItem','removeCartItem','clearCart',
 'filterHistorial','deleteVenta','startEditVenta','saveEditVenta','cancelEditVenta','exportHistorialCSV',
 'saveProducto','deleteProducto','startEditProducto','saveEditProducto','cancelEditProducto',
 'saveGasto','deleteGasto','startEditGasto','saveEditGasto','cancelEditGasto',
 'processConcilFile','exportConcilErrors',
 'saveBarbero','deleteBarbero','startEditBarbero','saveEditBarbero','cancelEditBarbero',
 'saveServicio','deleteServicio','startEditServicio','saveEditServicio','cancelEditServicio',
 'ventaFechaChange','ventaTipoChange','ventaFormaPagoChange','ventaServicioChange',
 'processImportFile','confirmImport','cancelImport'
].forEach(fn=>{
  window[fn]=function(){return window._bridge[fn]&&window._bridge[fn](...arguments)};
});
</script>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SB_URL = 'https://ssirnhqtmjxuuuwyilmp.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzaXJuaHF0bWp4dXV1d3lpbG1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTc5MTYsImV4cCI6MjA4OTU3MzkxNn0.4CS47Dk7B5cgTiJdLctKxuqXuDvPvnwLfg9RODu4FN8';
const sb = createClient(SB_URL, SB_KEY);

const PW = 'piston2026';
let MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
let DIAS_ES = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
let currentTab = 'dashboard';

// CARRITO DE PRODUCTOS
let cart = [];
let barberos = [], servicios = [], productos = [];

// ============ UTILS ============
function showOverlay(){document.getElementById('overlay').style.display='flex'}
function hideOverlay(){document.getElementById('overlay').style.display='none'}
function toast(msg,type='success'){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.className=`toast toast-${type}`;t.textContent=msg;c.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}
function fmt(n){return Number(n||0).toLocaleString('es-CL')}
function fmtCLP(n){return '$'+fmt(n)}
function today(){return new Date().toISOString().split('T')[0]}
function pad(n){return String(n).padStart(2,'0')}

async function loadCatalogos(){
  const [b,s,p]=await Promise.all([
    sb.from('barberos').select('*').order('nombre'),
    sb.from('servicios').select('*').order('nombre'),
    sb.from('productos').select('*').order('nombre')
  ]);
  barberos=b.data||[];servicios=s.data||[];productos=p.data||[];
}

// ============ LOGIN ============
function checkPw(){
  const v=document.getElementById('pwInput').value;
  if(v===PW){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='flex';
    const d=new Date();
    document.getElementById('topbarDate').textContent=d.toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    go('dashboard');
  } else {
    document.getElementById('loginErr').textContent='Contraseña incorrecta';
  }
}

// ============ TABS ============
function go(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    const tabs=['dashboard','venta','historial','inventario','gastos','conciliacion','equipo','importar'];
    b.classList.toggle('active',tabs[i]===tab);
  });
  const fns={dashboard:loadDashboard,venta:loadVenta,historial:loadHistorial,inventario:loadInventario,gastos:loadGastos,conciliacion:loadConciliacion,equipo:loadEquipo,importar:loadImportar};
  fns[tab]&&fns[tab]();
}

// ============ DASHBOARD ============
let dshFilters={anio:new Date().getFullYear(),mes:0};

async function loadDashboard(){
  document.getElementById('mainContent').innerHTML=`<div style="text-align:center;padding:40px;color:#64748B">Cargando...</div>`;
  showOverlay();
  await loadCatalogos();
  // Fetch all ventas & gastos
  const {data:ventas}=await sb.from('ventas').select('*');
  const {data:gastos}=await sb.from('gastos').select('*');
  hideOverlay();

  const anios=[...new Set((ventas||[]).map(v=>v.anio))].sort((a,b)=>b-a);
  if(!anios.includes(dshFilters.anio)&&anios.length) dshFilters.anio=anios[0];

  let vFilt=(ventas||[]).filter(v=>v.anio==dshFilters.anio);
  let gFilt=(gastos||[]).filter(g=>g.fecha&&Number(g.fecha.split('-')[0])==dshFilters.anio);
  if(dshFilters.mes>0){
    vFilt=vFilt.filter(v=>v.n_mes==dshFilters.mes);
    gFilt=gFilt.filter(g=>g.fecha&&Number(g.fecha.split('-')[1])==dshFilters.mes);
  }

  const totalVentas=vFilt.reduce((s,v)=>s+(v.total||0),0);
  const totalServicios=vFilt.filter(v=>v.tipo==='servicio').reduce((s,v)=>s+(v.monto||0),0);
  const totalProductos=vFilt.filter(v=>v.tipo==='PRODUCTO').reduce((s,v)=>s+(v.monto||0),0);
  const totalPropinas=vFilt.reduce((s,v)=>s+(v.propina||0),0);
  const totalGastos=gFilt.reduce((s,g)=>s+(g.monto||0),0);
  const utilidad=totalVentas-totalGastos;

  // Por forma de pago
  const ef=vFilt.filter(v=>v.forma_pago==='EF').reduce((s,v)=>s+(v.total||0),0);
  const tk=vFilt.filter(v=>v.forma_pago==='TK').reduce((s,v)=>s+(v.total||0),0);
  const trf=vFilt.filter(v=>v.forma_pago==='TRF').reduce((s,v)=>s+(v.total||0),0);

  // Por barbero
  const byBarbero={};
  vFilt.forEach(v=>{
    const n=v.barbero_nombre||'Sin barbero';
    if(!byBarbero[n]) byBarbero[n]={ventas:0,comision:0,propinas:0,productos:0};
    if(v.tipo==='servicio'){
      byBarbero[n].ventas+=(v.monto||0);
      // comision del servicio
      const svc=servicios.find(s=>s.nombre===v.servicio_producto);
      const pct=(svc?.comision||50)/100;
      byBarbero[n].comision+=(v.monto||0)*pct;
    }
    if(v.tipo==='PRODUCTO') byBarbero[n].productos+=(v.monto||0);
    byBarbero[n].propinas+=(v.propina||0);
  });
  Object.keys(byBarbero).forEach(k=>{
    byBarbero[k].total=byBarbero[k].comision+byBarbero[k].propinas+byBarbero[k].productos*0.1;
  });
  const barMax=Math.max(...Object.values(byBarbero).map(b=>b.ventas),1);

  // Últimas 10 ventas
  const ultimas=[...vFilt].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).slice(0,10);

  // Stock bajo
  const stockBajo=(productos||[]).filter(p=>p.stock<=p.stock_minimo);

  // Ventas web
  const webVentas=vFilt.filter(v=>v.es_web).length;

  const mesOpts=MESES.map((m,i)=>`<option value="${i+1}" ${dshFilters.mes==i+1?'selected':''}>${m}</option>`).join('');
  const anioOpts=anios.map(a=>`<option value="${a}" ${dshFilters.anio==a?'selected':''}>${a}</option>`).join('');

  document.getElementById('mainContent').innerHTML=`
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap">
    <span class="sec-title" style="margin:0">Dashboard</span>
    <select onchange="window._bridge.dshSetAnio(this.value)" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px">
      <option value="0" ${dshFilters.anio==0?'selected':''}>Todos los años</option>
      ${anioOpts}
    </select>
    <select onchange="window._bridge.dshSetMes(this.value)" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px">
      <option value="0" ${dshFilters.mes==0?'selected':''}>Todos los meses</option>
      ${mesOpts}
    </select>
    <span style="font-size:12px;color:#64748B">${dshFilters.mes>0?MESES[dshFilters.mes-1]:''} ${dshFilters.anio||''}</span>
  </div>

  <div class="grid-4" style="margin-bottom:16px">
    <div class="metric"><div class="metric-label">Ventas Totales</div><div class="metric-value">${fmtCLP(totalVentas)}</div><div class="metric-sub">${vFilt.length} transacciones</div></div>
    <div class="metric"><div class="metric-label">Servicios</div><div class="metric-value">${fmtCLP(totalServicios)}</div><div class="metric-sub">${vFilt.filter(v=>v.tipo==='servicio').length} servicios</div></div>
    <div class="metric"><div class="metric-label">Productos</div><div class="metric-value">${fmtCLP(totalProductos)}</div><div class="metric-sub">${vFilt.filter(v=>v.tipo==='PRODUCTO').length} ventas</div></div>
    <div class="metric"><div class="metric-label">Propinas</div><div class="metric-value">${fmtCLP(totalPropinas)}</div><div class="metric-sub">${webVentas} ventas web</div></div>
  </div>

  <div class="grid-3" style="margin-bottom:16px">
    <div class="metric"><div class="metric-label">Gastos</div><div class="metric-value" style="color:var(--red)">${fmtCLP(totalGastos)}</div><div class="metric-sub">${gFilt.length} registros</div></div>
    <div class="metric"><div class="metric-label">Utilidad Bruta</div><div class="metric-value" style="color:${utilidad>=0?'var(--green)':'var(--red)'}">${fmtCLP(utilidad)}</div><div class="metric-sub">Ventas - Gastos</div></div>
    <div class="metric">
      <div class="metric-label">Por Forma de Pago</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">
        <span class="badge badge-green">EF ${fmtCLP(ef)}</span>
        <span class="badge badge-blue">TK ${fmtCLP(tk)}</span>
        <span class="badge badge-purple">TRF ${fmtCLP(trf)}</span>
      </div>
    </div>
  </div>

  <div class="grid-2" style="margin-bottom:16px">
    <div class="card">
      <div class="card-title">Ventas por Barbero</div>
      ${Object.entries(byBarbero).sort((a,b)=>b[1].ventas-a[1].ventas).map(([n,d])=>`
        <div class="bar-chart-row">
          <div class="bar-chart-label">${n.split(' ')[0]}</div>
          <div class="bar-chart-bar"><div class="bar-chart-fill" style="width:${Math.round(d.ventas/barMax*100)}%"></div></div>
          <div class="bar-chart-val">${fmtCLP(d.ventas)}</div>
        </div>`).join('')||'<p style="color:#64748B;font-size:12px">Sin datos</p>'}
    </div>
    <div class="card">
      <div class="card-title">Liquidaciones por Barbero</div>
      <table>
        <thead><tr><th>Barbero</th><th>Comisión Svc</th><th>10% Prod.</th><th>Propinas</th><th>Total</th></tr></thead>
        <tbody>
          ${Object.entries(byBarbero).sort((a,b)=>b[1].total-a[1].total).map(([n,d])=>`
          <tr>
            <td><strong>${n.split(' ')[0]}</strong></td>
            <td>${fmtCLP(d.comision)}</td>
            <td>${fmtCLP(Math.round(d.productos*0.1))}</td>
            <td>${fmtCLP(d.propinas)}</td>
            <td><strong>${fmtCLP(Math.round(d.total))}</strong></td>
          </tr>`).join('')||'<tr><td colspan="5" style="color:#64748B">Sin datos</td></tr>'}
        </tbody>
      </table>
    </div>
  </div>

  <div class="grid-2" style="margin-bottom:16px">
    <div class="card">
      <div class="card-title">Últimas Transacciones</div>
      <table>
        <thead><tr><th>Fecha</th><th>Barbero</th><th>Servicio/Producto</th><th>Total</th><th>Pago</th></tr></thead>
        <tbody>
          ${ultimas.map(v=>`<tr>
            <td>${v.fecha||''}</td>
            <td>${(v.barbero_nombre||'').split(' ')[0]}</td>
            <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.servicio_producto||''}</td>
            <td>${fmtCLP(v.total)}</td>
            <td><span class="badge ${v.forma_pago==='EF'?'badge-green':v.forma_pago==='TK'?'badge-blue':'badge-purple'}">${v.forma_pago}</span></td>
          </tr>`).join('')||'<tr><td colspan="5" style="color:#64748B">Sin datos</td></tr>'}
        </tbody>
      </table>
    </div>
    <div class="card">
      <div class="card-title">Stock Bajo (≤ mínimo)</div>

function ventaFechaChange(val){
  if(!val) return;
  ventaForm.fecha=val;
  const d=new Date(val+'T12:00:00');
  document.getElementById('vAnio').value=d.getFullYear();
  document.getElementById('vNmes').value=d.getMonth()+1;
  document.getElementById('vMes').value=MESES[d.getMonth()];
  document.getElementById('vDia').value=d.getDate();
  document.getElementById('vDiaSemana').value=DIAS_ES[d.getDay()];
  // check promo
  const isPromo=d.getDay()===2||d.getDay()===3; // mar=2, mie=3
  document.getElementById('promoBadge').style.display=isPromo?'block':'none';
  if(isPromo) applyPromo();
  else {
    const svc=servicios.find(s=>s.id===document.getElementById('vServicio')?.value);
    if(svc) document.getElementById('vMonto').value=svc.precio;
  }
  updateTotal();
}

function applyPromo(){
  const sel=document.getElementById('vServicio');
  if(!sel) return;
  const svc=servicios.find(s=>s.id===sel.value);
  if(!svc) return;
  const d=new Date(ventaForm.fecha+'T12:00:00');
  const isPromo=d.getDay()===2||d.getDay()===3;
  if(isPromo&&(svc.tipo==='promo'||svc.tipo==='menor')&&svc.precio_promo){
    document.getElementById('vMonto').value=svc.precio_promo;
  } else {
    document.getElementById('vMonto').value=svc.precio;
  }
  updateTotal();
}

function ventaServicioChange(){
  applyPromo();
}

function ventaTipoChange(val){
  ventaForm.tipo=val;
  const bs=document.getElementById('bloqueServicio');
  const bp=document.getElementById('bloqueProducto');
  if(bs) bs.style.display=val==='servicio'?'block':'none';
  if(bp) bp.style.display=val==='PRODUCTO'?'block':'none';
  updateTotal();
}

function ventaFormaPagoChange(val){
  document.getElementById('bloqueAuth').style.display=(val==='TK'||val==='TRF')?'block':'none';
}

function updateTotal(){
  let monto=0;
  if(ventaForm.tipo==='servicio'){
    monto=Number(document.getElementById('vMonto')?.value||0);
  } else {
    monto=cart.reduce((s,c)=>s+c.total,0);
  }
  const prop=Number(document.getElementById('vPropina')?.value||0);
  const desc=Number(document.getElementById('vDescuento')?.value||0);
  document.getElementById('totalEstimado').textContent=fmtCLP(monto+prop-desc);
}

function addCartItem(){
  const sel=document.getElementById('vProducto');
  const pid=sel.value;
  if(!pid){toast('Selecciona un producto','error');return;}
  const opt=sel.selectedOptions[0];
  const nombre=opt.getAttribute('data-nombre');
  const precio=Number(opt.getAttribute('data-precio'));
  const stock=Number(opt.getAttribute('data-stock'));
  const qty=Number(document.getElementById('vCantidad').value||1);
  const pu=Number(document.getElementById('vPrecioUnit').value||precio);
  if(qty>stock){toast('Stock insuficiente','error');return;}
  const existing=cart.find(c=>c.pid===pid);
  if(existing){existing.qty+=qty;existing.total=existing.qty*existing.precio;}
  else cart.push({pid,nombre,precio:pu,qty,total:pu*qty,stock});
  renderCart();updateTotal();
}

function removeCartItem(idx){
  cart.splice(idx,1);renderCart();updateTotal();
}

function clearCart(){cart=[];renderCart();updateTotal();}

function renderCart(){
  const c=document.getElementById('cartContainer');
  if(!c) return;
  if(cart.length===0){c.innerHTML='<p style="color:#64748B;font-size:12px">Sin productos en el carrito</p>';return;}
  c.innerHTML=cart.map((it,i)=>`
    <div class="cart-item">
      <span style="flex:1">${it.nombre}</span>
      <span style="width:60px;text-align:center">${it.qty} u.</span>
      <span style="width:90px;text-align:right">${fmtCLP(it.total)}</span>
      <button class="btn btn-danger btn-sm" style="margin-left:8px" onclick="removeCartItem(${i})">✕</button>
    </div>`).join('');
}

async function submitVenta(){
  const bId=document.getElementById('vBarbero').value;
  if(!bId){toast('Selecciona un barbero','error');return;}
  const bNombre=barberos.find(b=>b.id===bId)?.nombre||'';
  const tipo=document.getElementById('vTipo').value;
  const formaPago=document.getElementById('vFormaPago').value;
  if(formaPago==='TK'||formaPago==='TRF'){
    if(!document.getElementById('vCodAuth').value){toast('Ingresa el Cod. Autorización','error');return;}
    if(!document.getElementById('vBoleta').value){toast('Ingresa el N° Boleta','error');return;}
  }
  const fecha=document.getElementById('vFecha').value;
  const d=new Date(fecha+'T12:00:00');

  const base={
    barbero_id:bId,barbero_nombre:bNombre,
    anio:d.getFullYear(),n_mes:d.getMonth()+1,mes:MESES[d.getMonth()],
    dia:d.getDate(),dia_semana:DIAS_ES[d.getDay()],fecha,
    propina:Number(document.getElementById('vPropina').value||0),
    descuento:Number(document.getElementById('vDescuento').value||0),
    forma_pago:formaPago,
    es_web:document.getElementById('vEsWeb').checked,
    cliente:document.getElementById('vCliente').value||null,
    comentarios:document.getElementById('vComentarios').value||null,
    cod_autorizacion:document.getElementById('vCodAuth')?.value||null,
    boleta:document.getElementById('vBoleta')?.value||null,
  };

  showOverlay();
  let rows=[];
  if(tipo==='servicio'){
    const monto=Number(document.getElementById('vMonto').value||0);
    const svcSel=document.getElementById('vServicio');
    const svc=servicios.find(s=>s.id===svcSel.value);
    rows.push({...base,tipo:'servicio',servicio_producto:svc?.nombre||'',monto,total:monto+base.propina-base.descuento});
  } else {
    if(cart.length===0){hideOverlay();toast('Agrega productos al carrito','error');return;}
    for(const it of cart){
      rows.push({...base,tipo:'PRODUCTO',servicio_producto:it.nombre,monto:it.total,total:it.total+base.propina-base.descuento});
      // descuento stock
      await sb.from('productos').update({stock:it.stock-it.qty}).eq('id',it.pid);
    }
  }
  const {error}=await sb.from('ventas').insert(rows);
  hideOverlay();
  if(error){toast('Error al guardar: '+error.message,'error');return;}
  toast(`✓ Venta registrada (${rows.length} registro${rows.length>1?'s':''})`)
  cart=[];
  renderVentaForm();
}

      <option value="">Todos los años</option>

    </select>
    <select onchange="window._bridge.hSet('mes',this.value)">
      <option value="">Todos los meses</option>
      ${MESES.map((m,i)=>`<option value="${i+1}" ${hFilters.mes==i+1?'selected':''}>${m}</option>`).join('')}
    </select>
    <select onchange="window._bridge.hSet('barbero',this.value)">
      <option value="">Todos los barberos</option>
      ${bNombres.map(b=>`<option value="${b}" ${hFilters.barbero===b?'selected':''}>${b}</option>`).join('')}
    </select>
    <select onchange="window._bridge.hSet('tipo',this.value)">
      <option value="">Tipo</option>
      <option value="servicio" ${hFilters.tipo==='servicio'?'selected':''}>Servicio</option>
      <option value="PRODUCTO" ${hFilters.tipo==='PRODUCTO'?'selected':''}>Producto</option>
    </select>
    <select onchange="window._bridge.hSet('pago',this.value)">
      <option value="">Pago</option>
      <option value="EF" ${hFilters.pago==='EF'?'selected':''}>EF</option>
      <option value="TK" ${hFilters.pago==='TK'?'selected':''}>TK</option>
      <option value="TRF" ${hFilters.pago==='TRF'?'selected':''}>TRF</option>
    </select>
    <input type="text" placeholder="Buscar (cod. auth, barbero, servicio...)" value="${hFilters.buscar}" oninput="window._bridge.hSet('buscar',this.value)" style="min-width:200px">
    <button class="btn btn-ghost btn-sm" onclick="exportHistorialCSV()">⬇ CSV</button>
    <span style="font-size:12px;color:#64748B;margin-left:auto">${rows.length} registros</span>
  </div>
  <div class="card" style="overflow-x:auto">
    <table>
      <thead><tr>
        <th>Fecha</th><th>Barbero</th><th>Tipo</th><th>Servicio/Producto</th>
        <th>Monto</th><th>Propina</th><th>Desc.</th><th>Total</th>
        <th>Pago</th><th>Cod. Auth</th><th>Boleta</th><th>Cliente</th><th>Acciones</th>

      <tbody id="hTbody">
        ${rows.map(v=>renderHistorialRow(v,bOpts,sOpts)).join('')}

function startEditVenta(id){
  editingVentaId=id;
  renderHistorial();
  // set select values
  const v=hData.find(r=>r.id===id);if(!v) return;
  setTimeout(()=>{
    const bSel=document.getElementById(`he-barbero-${id}`);
    if(bSel) bSel.value=v.barbero_id||'';
    const tSel=document.getElementById(`he-tipo-${id}`);
    if(tSel) tSel.value=v.tipo||'servicio';
    const pSel=document.getElementById(`he-pago-${id}`);
    if(pSel) pSel.value=v.forma_pago||'EF';
  },0);
}

function cancelEditVenta(){editingVentaId=null;renderHistorial();}

async function saveEditVenta(id){
  const bSel=document.getElementById(`he-barbero-${id}`);
  const bId=bSel?.value;
  const bNombre=barberos.find(b=>b.id===bId)?.nombre||document.getElementById(`he-barbero-${id}`)?.selectedOptions[0]?.text||'';
  const fecha=document.getElementById(`he-fecha-${id}`)?.value;
  const d=fecha?new Date(fecha+'T12:00:00'):null;

function exportHistorialCSV(){
  let rows=hData;
  if(hFilters.anio) rows=rows.filter(v=>String(v.anio)===hFilters.anio);
  if(hFilters.mes) rows=rows.filter(v=>String(v.n_mes)===hFilters.mes);
  if(hFilters.barbero) rows=rows.filter(v=>v.barbero_nombre===hFilters.barbero);
  if(hFilters.tipo) rows=rows.filter(v=>v.tipo===hFilters.tipo);
  if(hFilters.pago) rows=rows.filter(v=>v.forma_pago===hFilters.pago);
  if(hFilters.buscar){const q=hFilters.buscar.toLowerCase();rows=rows.filter(v=>(v.cod_autorizacion||'').toLowerCase().includes(q)||(v.barbero_nombre||'').toLowerCase().includes(q)||(v.servicio_producto||'').toLowerCase().includes(q));}
  const hdr=['Cod. Autorizacion','Boleta','Año','N° Mes','Mes','Dia','Dia Semana','Fecha','Barbero','Tipo','Cliente','Servicio/Producto','Monto','Propina','Descuento','Total','Forma Pago','Es Web','Comentarios'];
  const lines=[hdr.join(';'),...rows.map(v=>[v.cod_autorizacion||'',v.boleta||'',v.anio,v.n_mes,v.mes,v.dia,v.dia_semana,v.fecha,v.barbero_nombre,v.tipo,v.cliente||'',v.servicio_producto,v.monto,v.propina,v.descuento,v.total,v.forma_pago,v.es_web?'SI':'NO',v.comentarios||''].join(';'))];
  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`piston_ventas_${today()}.csv`;a.click();
}

function processConcilFile(input){
  const file=input.files[0];
  if(!file){return;}
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const text=e.target.result;
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2){document.getElementById('concilResult').innerHTML='<p style="color:var(--red)">Archivo vacío o inválido</p>';return;}
      // Parse CSV (delimiter ; or ,)
      const delim=lines[0].includes(';')?';':',';
      const headers=lines[0].split(delim).map(h=>h.trim().toLowerCase().replace(/"/g,''));
      const rows=lines.slice(1).map(l=>{
        const cols=l.split(delim).map(c=>c.trim().replace(/"/g,''));
        const obj={};headers.forEach((h,i)=>obj[h]=cols[i]||'');
        return obj;
      });
      // Try to find cod autorizacion column
      const codKey=headers.find(h=>h.includes('autorizacion')||h.includes('auth')||h.includes('codigo')||h.includes('num_aprobacion')||h.includes('aprobacion'));
      const montoKey=headers.find(h=>h.includes('monto')||h.includes('importe')||h.includes('total'));
      const propinaKey=headers.find(h=>h.includes('propina')||h.includes('tip'));

      if(!codKey||!montoKey){
        document.getElementById('concilResult').innerHTML=`<p style="color:var(--red)">No se encontró columna de Cod. Autorización o Monto.<br>Columnas disponibles: ${headers.join(', ')}</p>`;
        return;
      }

      // Group ventas by cod_autorizacion
      const ventasByCod={};
      concilData.ventas.forEach(v=>{
        if(v.cod_autorizacion){
          if(!ventasByCod[v.cod_autorizacion]) ventasByCod[v.cod_autorizacion]=[];
          ventasByCod[v.cod_autorizacion].push(v);
        }
      });

      let matches=0,diffs=0,missing=0;
      const resultRows=rows.map(r=>{
        const cod=r[codKey]?.trim();
        const montoArch=Number((r[montoKey]||'0').replace(/[^0-9.-]/g,''));
        const propArch=propinaKey?Number((r[propinaKey]||'0').replace(/[^0-9.-]/g,'')):0;
        if(!cod) return null;
        const vsys=ventasByCod[cod];
        if(!vsys){missing++;return{cod,montoArch,propArch,estado:'FALTANTE EN SISTEMA',vsys:null};}
        const totalSys=vsys.reduce((s,v)=>s+(v.total||0),0);
        const propSys=vsys.reduce((s,v)=>s+(v.propina||0),0);
        const diffMonto=Math.abs(montoArch-totalSys);
        const diffProp=Math.abs(propArch-propSys);
        if(diffMonto>100||diffProp>100){diffs++;return{cod,montoArch,propArch,totalSys,propSys,estado:'DIFERENCIA',vsys};}
        matches++;return{cod,montoArch,propArch,totalSys,propSys,estado:'OK',vsys};
      }).filter(Boolean);

      concilData.resultados=resultRows;
      document.getElementById('concilResult').innerHTML=`
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">
          <span class="badge badge-green">✓ Coincidentes: ${matches}</span>
          <span class="badge badge-amber">⚠ Diferencias: ${diffs}</span>
          <span class="badge badge-red">✗ Faltantes en sistema: ${missing}</span>
        </div>
        <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Cod. Auth</th><th>Monto Archivo</th><th>Monto Sistema</th><th>Propina Arch.</th><th>Propina Sis.</th><th>Estado</th></tr></thead>
          <tbody>
            ${resultRows.map(r=>`<tr class="${r.estado==='OK'?'concil-match':r.estado==='DIFERENCIA'?'concil-diff':'concil-missing'}">
              <td>${r.cod}</td>
              <td>${fmtCLP(r.montoArch)}</td>
              <td>${r.totalSys!=null?fmtCLP(r.totalSys):'-'}</td>
              <td>${fmtCLP(r.propArch)}</td>
              <td>${r.propSys!=null?fmtCLP(r.propSys):'-'}</td>
              <td><span class="badge ${r.estado==='OK'?'badge-green':r.estado==='DIFERENCIA'?'badge-amber':'badge-red'}">${r.estado}</span></td>
            </tr>`).join('')}
          </tbody>
        </table>
        </div>
        ${(diffs+missing)>0?`<button class="btn btn-ghost btn-sm" style="margin-top:12px" onclick="exportConcilErrors()">⬇ Exportar Errores CSV</button>`:''}
      `;
    }catch(err){document.getElementById('concilResult').innerHTML=`<p style="color:var(--red)">Error al procesar archivo: ${err.message}</p>`;}
  };
  reader.readAsText(file,'UTF-8');
}

function exportConcilErrors(){
  const errs=concilData.resultados.filter(r=>r.estado!=='OK');
  if(!errs.length){toast('No hay errores para exportar','info');return;}
  const hdr=['Cod. Autorización','Monto Archivo','Monto Sistema','Propina Arch.','Propina Sis.','Estado'];
  const lines=[hdr.join(';'),...errs.map(r=>[r.cod,r.montoArch,r.totalSys||0,r.propArch,r.propSys||0,r.estado].join(';'))];
  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`concil_errores_${today()}.csv`;a.click();
}

function processImportFile(input){
  const file = input.files[0];
  if(!file) return;
  const tipo = document.getElementById('importTipo').value;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const text = e.target.result;
      const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l);
      if(lines.length < 2){ toast('Archivo vacío o sin datos','error'); return; }

      // Auto-detect delimiter
      const delim = lines[0].split(';').length > lines[0].split(',').length ? ';' : ',';

      // Parse headers - normalize
      const rawHeaders = lines[0].split(delim).map(h=>h.trim().replace(/"/g,'').toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g,''));
      
      // Parse all rows
      const rows = lines.slice(1).map(line=>{
        // Handle quoted fields
        const cols = [];
        let cur = '', inQ = false;
        for(let i=0;i<line.length;i++){
          const ch = line[i];
          if(ch==='"'){ inQ=!inQ; }
          else if(ch===delim && !inQ){ cols.push(cur.trim()); cur=''; }
          else { cur+=ch; }
        }
        cols.push(cur.trim());
        const obj = {};
        rawHeaders.forEach((h,i)=>{ obj[h] = (cols[i]||'').replace(/"/g,'').trim(); });
        return obj;
      }).filter(r => Object.values(r).some(v=>v)); // remove empty rows

      if(rows.length === 0){ toast('No se encontraron datos','error'); return; }

      if(tipo === 'ventas'){
        importPreview = parseVentasRows(rows, rawHeaders);
      } else {
        importPreview = parseGastosRows(rows, rawHeaders);
      }

      renderImportPreview(tipo);
    } catch(err){
      toast('Error al leer archivo: '+err.message,'error');
      console.error(err);
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function normalizeHeader(h){
  return h.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
}

function findCol(row, ...candidates){
  for(const c of candidates){
    const norm = normalizeHeader(c);
    const key = Object.keys(row).find(k=>normalizeHeader(k)===norm || normalizeHeader(k).includes(norm));
    if(key && row[key]!==undefined && row[key]!=='') return row[key];
  }
  return '';
}

function parseNum(v){
  if(!v) return 0;
  // Remove currency symbols, dots as thousand separators, convert comma decimal
  const s = String(v).replace(/[$\s]/g,'').replace(/\./g,'').replace(',','.');
  const n = parseFloat(s);
  return isNaN(n)?0:Math.round(n);
}

function parseFecha(v){
  if(!v) return null;
  v = v.trim();
  // YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
  // DD-MM-YYYY or DD/MM/YYYY
  const m = v.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})$/);
  if(m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  // DD-MM-YY
  const m2 = v.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{2})$/);
  if(m2) return `20${m2[3]}-${m2[2].padStart(2,'0')}-${m2[1].padStart(2,'0')}`;
  return null;
}

function parseVentasRows(rows, headers){
  return rows.map((r,idx)=>{
    const fechaRaw = findCol(r,'fecha','date');
    const fecha = parseFecha(fechaRaw);
    let d = fecha ? new Date(fecha+'T12:00:00') : null;

    // Detect barbero name from various possible column names
    const barberoNombre = (findCol(r,'barbero','barber','nombre barbero') || '').toUpperCase().trim();
    
    // Detect tipo
    let tipo = (findCol(r,'tipo','type') || 'servicio').toLowerCase().trim();
    if(tipo.includes('prod')) tipo = 'PRODUCTO';
    else tipo = 'servicio';

    // Forma pago
    let fp = (findCol(r,'forma pago','formapago','pago','forma de pago','payment') || 'EF').toUpperCase().trim();
    if(!['EF','TK','TRF'].includes(fp)){
      if(fp.includes('EFECT')||fp.includes('CASH')) fp='EF';
      else if(fp.includes('TARF')||fp.includes('CARD')||fp.includes('DBIT')||fp.includes('CRED')) fp='TK';
      else if(fp.includes('TRANSF')||fp.includes('TRANSFER')) fp='TRF';
      else fp='EF';
    }

    const monto = parseNum(findCol(r,'monto','amount','importe','valor'));
    const propina = parseNum(findCol(r,'propina','tip','propinas'));
    const descuento = parseNum(findCol(r,'descuento','discount','desc'));
    const totalRaw = parseNum(findCol(r,'total'));
    const total = totalRaw || (monto + propina - descuento);

    const esWebRaw = (findCol(r,'es web','esweb','web','is web')||'').toLowerCase();
    const esWeb = esWebRaw==='si'||esWebRaw==='sí'||esWebRaw==='true'||esWebRaw==='1'||esWebRaw==='yes';

    // Año/mes from fecha if not in CSV
    const anio = parseNum(findCol(r,'año','anio','year')) || (d?d.getFullYear():null);
    const nMes = parseNum(findCol(r,'n° mes','n mes','nmes','mes numero','mes_num','num mes')) || (d?d.getMonth()+1:null);
    const mesNombre = findCol(r,'mes','month') || (d?MESES[d.getMonth()]:'');
    const dia = parseNum(findCol(r,'dia','día','day')) || (d?d.getDate():null);
    const diaSemana = findCol(r,'dia semana','día semana','diasemana','day of week') || (d?DIAS_ES[d.getDay()]:'');

    const errors = [];
    if(!fecha) errors.push('sin fecha');
    if(!barberoNombre) errors.push('sin barbero');
    if(!monto && !total) errors.push('sin monto');

    return {
      _row: idx+2,
      _errors: errors,
      _barberoNombre: barberoNombre,
      barbero_nombre: barberoNombre,
      barbero_id: null, // resolved later
      cod_autorizacion: findCol(r,'cod autorizacion','cod. autorizacion','codautorizacion','autorizacion','num aprobacion','codigo','auth') || null,
      boleta: findCol(r,'boleta','n° boleta','nboleta','boleta num') || null,
      anio, n_mes: nMes, mes: mesNombre, dia, dia_semana: diaSemana,
      fecha, tipo,
      cliente: findCol(r,'cliente','client','customer') || null,
      servicio_producto: findCol(r,'servicio producto','servicio/producto','servicio','producto','service','item') || '',
      monto, propina, descuento, total,
      forma_pago: fp,
      es_web: esWeb,
      comentarios: findCol(r,'comentarios','comments','notas','notes') || null,
    };
  });
}

function parseGastosRows(rows, headers){
  return rows.map((r,idx)=>{
    const fechaRaw = findCol(r,'fecha','date');
    const fecha = parseFecha(fechaRaw);
    const monto = parseNum(findCol(r,'monto','amount','importe','valor'));
    const desc = findCol(r,'descripcion','descripción','description','detalle') || '';
    const errors = [];
    if(!fecha) errors.push('sin fecha');
    if(!monto) errors.push('sin monto');
    if(!desc) errors.push('sin descripción');
    let fp = (findCol(r,'forma pago','formapago','pago','payment')||'EF').toUpperCase().trim();
    if(!['EF','TK','TRF'].includes(fp)) fp='EF';
    const CATS=['Arriendo','Servicios básicos','Insumos y productos','Equipamiento','Marketing','Sueldos/Comisiones','Anticipos','Mantenimiento','Otro'];
    let cat = findCol(r,'categoria','categoría','category') || 'Otro';
    if(!CATS.map(c=>c.toLowerCase()).includes(cat.toLowerCase())) cat='Otro';
    else cat = CATS.find(c=>c.toLowerCase()===cat.toLowerCase()) || 'Otro';
    return {
      _row: idx+2,
      _errors: errors,
      fecha, descripcion: desc, categoria: cat, monto,
      forma_pago: fp,
      notas: findCol(r,'notas','notes','comentarios') || null,
    };
  });
}

function renderImportPreview(tipo){
  const sec = document.getElementById('importPreviewSection');
  sec.style.display = 'block';
  const total = importPreview.length;
  const errRows = importPreview.filter(r=>r._errors&&r._errors.length>0);
  const okRows = importPreview.filter(r=>!r._errors||r._errors.length===0);

  document.getElementById('importStats').innerHTML=`
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <span class="badge badge-blue">📄 Total filas: ${total}</span>
      <span class="badge badge-green">✓ Válidas: ${okRows.length}</span>
      ${errRows.length>0?`<span class="badge badge-amber">⚠ Con advertencias: ${errRows.length}</span>`:''}
    </div>`;

  // Resolve barbero IDs for ventas
  if(tipo==='ventas'){
    importPreview.forEach(r=>{
      if(r._barberoNombre){
        const b = barberos.find(b=>b.nombre.toUpperCase()===r._barberoNombre.toUpperCase() || 
                                   b.nombre.toUpperCase().includes(r._barberoNombre.split(' ')[0]) ||
                                   r._barberoNombre.includes(b.nombre.split(' ')[0].toUpperCase()));
        if(b){ r.barbero_id=b.id; r.barbero_nombre=b.nombre; }
        else { if(!r._errors.includes('barbero no encontrado')) r._errors.push('barbero no encontrado: '+r._barberoNombre); }
      }
    });
  }

  // Preview table - first 10 rows
  const preview = importPreview.slice(0,10);
  let tableHtml = '';
  if(tipo==='ventas'){
    tableHtml = `<table>
      <thead><tr><th>Fila</th><th>Fecha</th><th>Barbero</th><th>Tipo</th><th>Servicio/Producto</th><th>Monto</th><th>Propina</th><th>Total</th><th>Pago</th><th>Estado</th></tr></thead>
      <tbody>
      ${preview.map(r=>`<tr style="${r._errors&&r._errors.length?'background:#FFFBEB':''}">
        <td style="color:#64748B">${r._row}</td>
        <td>${r.fecha||'—'}</td>
        <td>${r.barbero_nombre||r._barberoNombre||'—'}</td>
        <td><span class="badge ${r.tipo==='servicio'?'badge-blue':'badge-green'}">${r.tipo}</span></td>
        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.servicio_producto||'—'}</td>
        <td>${fmtCLP(r.monto)}</td>
        <td>${fmtCLP(r.propina)}</td>
        <td><strong>${fmtCLP(r.total)}</strong></td>
        <td><span class="badge ${r.forma_pago==='EF'?'badge-green':r.forma_pago==='TK'?'badge-blue':'badge-purple'}">${r.forma_pago}</span></td>
        <td>${r._errors&&r._errors.length?`<span class="badge badge-amber" title="${r._errors.join(', ')}">⚠ ${r._errors.join(', ')}</span>`:'<span class="badge badge-green">✓</span>'}</td>
      </tr>`).join('')}
      </tbody>
    </table>`;
  } else {
    tableHtml = `<table>
      <thead><tr><th>Fila</th><th>Fecha</th><th>Descripción</th><th>Categoría</th><th>Monto</th><th>Pago</th><th>Estado</th></tr></thead>
      <tbody>
      ${preview.map(r=>`<tr style="${r._errors&&r._errors.length?'background:#FFFBEB':''}">
        <td style="color:#64748B">${r._row}</td>
        <td>${r.fecha||'—'}</td>
        <td>${r.descripcion||'—'}</td>
        <td><span class="badge badge-amber">${r.categoria}</span></td>
        <td><strong>${fmtCLP(r.monto)}</strong></td>
        <td>${r.forma_pago}</td>
        <td>${r._errors&&r._errors.length?`<span class="badge badge-amber">${r._errors.join(', ')}</span>`:'<span class="badge badge-green">✓</span>'}</td>
      </tr>`).join('')}
      </tbody>
    </table>`;
  }
  if(importPreview.length>10){
    tableHtml += `<p style="color:#64748B;font-size:12px;margin-top:8px">... y ${importPreview.length-10} filas más</p>`;
  }
  document.getElementById('importPreviewTable').innerHTML = tableHtml;

  // Warnings
  const noBarb = tipo==='ventas' ? importPreview.filter(r=>!r.barbero_id) : [];
  let warnHtml = '';
  if(noBarb.length>0){
    const nombres = [...new Set(noBarb.map(r=>r._barberoNombre))].filter(Boolean);
    warnHtml += `<div style="background:#FEF3C7;border:1px solid #FCD34D;border-radius:6px;padding:10px;font-size:12px;margin-bottom:8px">
      <strong>⚠ Barberos no encontrados en el sistema</strong> (${noBarb.length} filas afectadas): ${nombres.join(', ')}<br>
      <span style="color:#64748B">Estas filas se importarán sin asociar a un barbero. Puedes editarlas después en Historial.</span>
    </div>`;
  }
  document.getElementById('importWarnings').innerHTML = warnHtml;

  const skipped = importPreview.filter(r=>r._errors&&r._errors.includes('sin fecha')&&r._errors.includes('sin monto'));
  document.getElementById('importConfirmInfo').innerHTML=`
    Se importarán <strong>${okRows.length + errRows.length - skipped.length} registros</strong> de ${tipo} al sistema.
    ${skipped.length>0?`<span style="color:var(--amber)"> (${skipped.length} filas ignoradas por falta de fecha y monto)</span>`:''}
    <br><span style="color:#64748B;font-size:12px">⚠ Esta acción no se puede deshacer fácilmente. Asegúrate de que los datos sean correctos.</span>`;
}

async function confirmImport(){
  const tipo = document.getElementById('importTipo').value;
  // Filter out rows with critical errors (no fecha AND no monto)
  const toInsert = importPreview.filter(r=>!(r._errors&&r._errors.includes('sin fecha')&&r._errors.includes('sin monto')));
  if(toInsert.length===0){ toast('No hay datos válidos para importar','error'); return; }
  if(!confirm(`¿Importar ${toInsert.length} registros de ${tipo}? Esta acción insertará los datos en la base de datos.`)) return;

  document.getElementById('importProgress').style.display='block';
  const fill = document.getElementById('importProgressFill');
  const txt = document.getElementById('importProgressText');
  const BATCH = 50;
  let inserted = 0, errors = 0;

  // Clean rows - remove internal fields
  const cleanRows = toInsert.map(r=>{
    const clean = {...r};
    delete clean._row; delete clean._errors; delete clean._barberoNombre;
    // Ensure nulls for empty strings
    Object.keys(clean).forEach(k=>{ if(clean[k]==='') clean[k]=null; });
    return clean;
  });

  for(let i=0; i<cleanRows.length; i+=BATCH){
    const batch = cleanRows.slice(i, i+BATCH);
    const {error} = tipo==='ventas'
      ? await sb.from('ventas').insert(batch)
      : await sb.from('gastos').insert(batch);
    if(error){ errors += batch.length; console.error('Batch error:', error); }
    else inserted += batch.length;
    const pct = Math.round((i+batch.length)/cleanRows.length*100);
    fill.style.width = pct+'%';
    txt.textContent = `Procesando... ${i+batch.length} de ${cleanRows.length} (${pct}%)`;
    await new Promise(r=>setTimeout(r,50)); // let UI breathe
  }

  fill.style.width='100%';
  if(errors===0){
    txt.textContent = `✓ Importación completada: ${inserted} registros insertados`;
    txt.style.color = 'var(--green)';
    toast(`✓ ${inserted} registros importados correctamente`);
  } else {
    txt.textContent = `Completado: ${inserted} OK, ${errors} con error`;
    txt.style.color = 'var(--amber)';
    toast(`Importado con errores: ${inserted} OK, ${errors} fallidos`,'error');
  }
  importPreview = [];
  // Hide confirm button
  document.querySelector('#importPreviewSection .section-card:last-child .btn-primary').style.display='none';
}

function cancelImport(){
  importPreview=[];
  loadImportar();
}
