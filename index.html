<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Píston Barbería</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;font-size:13px;background:#F8FAFC;color:#1E293B}
:root{--blue:#1E6FD9;--green:#15803D;--red:#DC2626;--amber:#B45309;--border:#E2E8F0;--card:#fff;--text:#1E293B;--muted:#64748B}
/* LOGIN */
#loginScreen{position:fixed;inset:0;background:#1E293B;display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#fff;border-radius:16px;padding:40px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h1{font-size:24px;font-weight:700;color:#1E293B;margin-bottom:4px}
.login-box p{color:#64748B;margin-bottom:24px;font-size:13px}
.login-box input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:var(--blue)}
.login-box button{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.login-box .err{color:var(--red);font-size:12px;margin-top:8px}
/* LAYOUT */
#app{display:none;flex-direction:column;height:100vh}
.topbar{background:#1E293B;color:#fff;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-weight:700;font-size:16px;letter-spacing:.5px}
.topbar-subtitle{font-size:11px;color:#94A3B8}
.tabs{background:#fff;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;flex-shrink:0;padding:0 16px}
.tab-btn{padding:12px 16px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:500;color:#64748B;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-btn:hover{color:#1E293B}
.content{flex:1;overflow-y:auto;padding:20px}
/* CARDS */
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px}
.card-title{font-size:12px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
/* METRICS */
.metric{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px}
.metric-label{font-size:11px;color:#64748B;font-weight:500;margin-bottom:6px}
.metric-value{font-size:24px;font-weight:700;color:#1E293B}
.metric-sub{font-size:11px;color:#64748B;margin-top:4px}
/* TABLES */
table{width:100%;border-collapse:collapse}
th{padding:8px 10px;text-align:left;font-size:11px;font-weight:600;color:#64748B;border-bottom:1px solid var(--border);background:#F8FAFC}
td{padding:8px 10px;font-size:12px;border-bottom:1px solid #F1F5F9;vertical-align:middle}
tr:hover td{background:#F8FAFC}
/* FORMS */
.form-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px}
.form-group label{font-size:11px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none;background:#fff;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue)}
/* BUTTONS */
.btn{padding:8px 14px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#1558b0}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-ghost{background:#F1F5F9;color:#374151;border:1px solid var(--border)}
.btn-ghost:hover{background:#E2E8F0}
.btn-sm{padding:5px 10px;font-size:11px}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge-blue{background:#DBEAFE;color:#1D4ED8}
.badge-green{background:#DCFCE7;color:#15803D}
.badge-red{background:#FEE2E2;color:#DC2626}
.badge-amber{background:#FEF3C7;color:#B45309}
.badge-gray{background:#F1F5F9;color:#475569}
.badge-purple{background:#EDE9FE;color:#6D28D9}
.badge-mp{background:#E0F2FE;color:#0369A1}
/* PROGRESS BAR */
.progress-bar{height:6px;background:#E2E8F0;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:.3s}
/* OVERLAY */
#overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:8000;display:none;align-items:center;justify-content:center}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* TOAST */
#toast-container{position:fixed;bottom:20px;right:20px;z-index:9998;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;color:#fff;max-width:320px;animation:slideIn .2s ease;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast-success{background:#15803D}
.toast-error{background:#DC2626}
.toast-info{background:#1E6FD9}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
/* FILTERS */
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px}
.filters select,.filters input{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:#fff}
/* INLINE EDIT */
.edit-cell{display:none}
.edit-cell input,.edit-cell select{width:100%;padding:4px 6px;border:1px solid var(--blue);border-radius:4px;font-size:12px}
.row-editing .view-cell{display:none}
.row-editing .edit-cell{display:block}
/* BAR CHART */
.bar-chart-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-chart-label{width:140px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right}
.bar-chart-bar{flex:1;height:18px;background:#E2E8F0;border-radius:4px;overflow:hidden}
.bar-chart-fill{height:100%;background:var(--blue);border-radius:4px;transition:.5s}
.bar-chart-val{width:80px;font-size:12px;font-weight:600;color:#1E293B}
/* SECTION TITLE */
.sec-title{font-size:15px;font-weight:700;color:#1E293B;margin-bottom:16px}
/* RESPONSIVE */
@media(max-width:768px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr 1fr}.grid-2{grid-template-columns:1fr}}
/* CARRITO */
.cart-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#F8FAFC;border-radius:6px;margin-bottom:6px;border:1px solid var(--border)}
/* CONCILIACION */
.concil-match{background:#DCFCE7}
.concil-diff{background:#FEF3C7}
.concil-missing{background:#FEE2E2}
/* MODAL-LIKE SECTION */
.section-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
</style>
</head>
<body>

<!-- BRIDGE -->
<script>
window._bridge = {};
['checkPw','go','dshTab','loadDashboard','loadVenta','loadHistorial','loadInventario','loadGastos','loadConciliacion','loadEquipo','loadImportar','loadArqueo','loadAnalisis','loadLiquidacion','loadGiftCards',
 'submitVenta','addCartItem','removeCartItem','clearCart',
 'filtrarProductos','seleccionarProducto','limpiarSeleccionProducto',
 'filterHistorial','deleteVenta','startEditVenta','saveEditVenta','cancelEditVenta','exportHistorialCSV',
 'saveProducto','deleteProducto','startEditProducto','saveEditProducto','cancelEditProducto',
 'saveGasto','deleteGasto','startEditGasto','saveEditGasto','cancelEditGasto',
 'processConcilFile','exportConcilErrors',
 'saveBarbero','deleteBarbero','startEditBarbero','saveEditBarbero','cancelEditBarbero',
 'saveServicio','deleteServicio','startEditServicio','saveEditServicio','cancelEditServicio',

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ============ UTILS ============
function showOverlay(){document.getElementById('overlay').style.display='flex'}
function hideOverlay(){document.getElementById('overlay').style.display='none'}
function toast(msg,type='success'){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.className=`toast toast-${type}`;t.textContent=msg;c.appendChild(t);

function fmt(n){return Number(n||0).toLocaleString('es-CL')}
function fmtCLP(n){return '$'+fmt(n)}
function today(){return new Date().toISOString().split('T')[0]}
function pad(n){return String(n).padStart(2,'0')}

async function loadCatalogos(){
  const [b,s,p]=await Promise.all([
    sb.from('barberos').select('*').order('nombre'),
    sb.from('servicios').select('*').order('nombre'),
    sb.from('productos').select('*').order('nombre')
  ]);
  barberos=b.data||[];servicios=s.data||[];productos=p.data||[];
}

// ============ LOGIN ============

  const v=document.getElementById('pwInput').value;
  if(v===PW){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='flex';

}

// ============ TABS ============
function go(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    const tabs=['dashboard','venta','historial','inventario','gastos','conciliacion','equipo','arqueo','analisis','liquidacion','importar'];
    b.classList.toggle('active',tabs[i]===tab);
  });
  const fns={dashboard:loadDashboard,venta:loadVenta,historial:loadHistorial,inventario:loadInventario,gastos:loadGastos,conciliacion:loadConciliacion,equipo:loadEquipo,arqueo:loadArqueo,analisis:loadAnalisis,liquidacion:loadLiquidacion,importar:loadImportar};
  fns[tab]&&fns[tab]();
}

// ============ DASHBOARD ============
let dshFilters={anio:new Date().getFullYear(),mes:new Date().getMonth()+1};

async function loadDashboard(){
  document.getElementById('mainContent').innerHTML=`<div style="text-align:center;padding:40px;color:#64748B">Cargando datos...</div>`;
  showOverlay();
  await loadCatalogos();
  // Fetch all ventas & gastos
  // RPC que retorna JSON directo, sin límite de filas de PostgREST
  const {data:ventasJson} = await sb.rpc('get_ventas_anio_json', {p_anio: dshFilters.anio});
  const ventas = ventasJson || [];
  const {data:gastos} = await sb.from('gastos').select('*').range(0,4999);
  hideOverlay();

  // Años disponibles — consultamos aparte para el selector
  const {data:aniosData} = await sb.from('ventas').select('anio').range(0,4999);
  const anios=[...new Set((aniosData||[]).map(v=>v.anio).filter(Boolean))].sort((a,b)=>b-a);

  

  let vFilt = (ventas||[]);
  let gFilt = (gastos||[]).filter(g=>g.fecha&&Number(g.fecha.split('-')[0])==dshFilters.anio);
  if(dshFilters.mes>0){
    vFilt=vFilt.filter(v=>v.n_mes==dshFilters.mes);
    gFilt=gFilt.filter(g=>g.fecha&&Number(g.fecha.split('-')[1])==dshFilters.mes);
  }

  const totalVentas=vFilt.reduce((s,v)=>s+(v.total||0),0);
  const totalServicios=vFilt.filter(v=>v.tipo==='servicio').reduce((s,v)=>s+(v.monto||0),0);
  const totalProductos=vFilt.filter(v=>v.tipo==='PRODUCTO').reduce((s,v)=>s+(v.monto||0),0);
  const totalPropinas=vFilt.reduce((s,v)=>s+(v.propina||0),0);
  const totalGastos=gFilt.reduce((s,g)=>s+(g.monto||0),0);
  const utilidad=totalVentas-totalGastos;

  // Por forma de pago
  const ef=vFilt.filter(v=>v.forma_pago==='EF').reduce((s,v)=>s+(v.total||0),0);
  const tk=vFilt.filter(v=>v.forma_pago==='TK').reduce((s,v)=>s+(v.total||0),0);
  const trf=vFilt.filter(v=>v.forma_pago==='TRF').reduce((s,v)=>s+(v.total||0),0);
  const mp=vFilt.filter(v=>v.forma_pago==='MP').reduce((s,v)=>s+(v.total||0),0);

  // Por barbero — solo servicios para liquidaciones
  const byBarbero={};
  vFilt.forEach(v=>{
    const n=v.barbero_nombre||'Sin barbero';
    if(!byBarbero[n]) byBarbero[n]={
      ventas:0,
      // EF servicios
      efMonto:0, efPropina:0,
      // TK+TRF+MP servicios
      tkMonto:0, tkPropina:0,
      // productos (para barras)
      productos:0
    };
    const esEF = v.forma_pago==='EF';
    if(v.tipo==='servicio'){
      byBarbero[n].ventas+=(v.monto||0);
      const svc=servicios.find(s=>s.nombre===v.servicio_producto);
      const pct=(svc?.comision||50)/100;
      const com=Math.round((v.monto||0)*pct);
      const prop=(v.propina||0);
      if(esEF){ byBarbero[n].efMonto+=com; byBarbero[n].efPropina+=prop; }
      else     { byBarbero[n].tkMonto+=com; byBarbero[n].tkPropina+=prop; }
    }
    if(v.tipo==='PRODUCTO') byBarbero[n].productos+=(v.monto||0);
  });
  Object.keys(byBarbero).forEach(k=>{
    const b=byBarbero[k];
    b.efTotal  = b.efMonto + b.efPropina;
    b.tkTotal  = b.tkMonto + b.tkPropina;
    b.total    = b.efTotal + b.tkTotal;
    // Para barras y orden
    b.comision = b.efMonto + b.tkMonto;
    b.propinas = b.efPropina + b.tkPropina;
  });
  const barMax=Math.max(...Object.values(byBarbero).map(b=>b.ventas),1);

  // Últimas 10 ventas
  const ultimas=[...vFilt].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).slice(0,10);

  // Stock bajo
  const stockBajo=(productos||[]).filter(p=>p.stock<=p.stock_minimo).sort((a,b)=>(a.marca||'').localeCompare(b.marca||''));

  function renderStockBajoTabla(lista){
    if(!lista.length) return '<p style="color:var(--green);font-size:12px">✓ Todo el stock está bien</p>';
    return `<div style="max-height:260px;overflow-y:auto">
      <table>
        <thead><tr><th>Marca</th><th>Producto</th><th>Categoría</th><th>Stock</th><th>Mín.</th></tr></thead>
        <tbody>
          ${lista.map(p=>`<tr>
            <td><span class="badge badge-gray">${p.marca||'—'}</span></td>
            <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.nombre}</td>
            <td style="color:#64748B;font-size:11px">${p.categoria||'—'}</td>
            <td style="color:var(--red);font-weight:700">${p.stock}</td>
            <td>${p.stock_minimo}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  }

  // Ventas web
  const webVentas=vFilt.filter(v=>v.es_web).length;

  const mesOpts=MESES.map((m,i)=>`<option value="${i+1}" ${dshFilters.mes==i+1?'selected':''}>${m}</option>`).join('');
  const anioOpts=anios.map(a=>`<option value="${a}" ${dshFilters.anio==a?'selected':''}>${a}</option>`).join('');

  document.getElementById('mainContent').innerHTML=`
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap">
    <span class="sec-title" style="margin:0">Dashboard</span>
    <select onchange="window._bridge.dshSetAnio(this.value)" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px">
      <option value="0" ${dshFilters.anio==0?'selected':''}>Todos los años</option>
      ${anioOpts}
    </select>
    <select onchange="window._bridge.dshSetMes(this.value)" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px">
      <option value="0" ${dshFilters.mes==0?'selected':''}>Todos los meses</option>
      ${mesOpts}
    </select>
    <span style="font-size:12px;color:#64748B">${dshFilters.mes>0?MESES[dshFilters.mes-1]:''} ${dshFilters.anio||''}</span>
  </div>

  <div class="grid-4" style="margin-bottom:16px">
    <div class="metric"><div class="metric-label">Ventas Totales</div><div class="metric-value">${fmtCLP(totalVentas)}</div><div class="metric-sub">${vFilt.length} transacciones</div></div>
    <div class="metric"><div class="metric-label">Servicios</div><div class="metric-value">${fmtCLP(totalServicios)}</div><div class="metric-sub">${vFilt.filter(v=>v.tipo==='servicio').length} servicios</div></div>
    <div class="metric"><div class="metric-label">Productos</div><div class="metric-value">${fmtCLP(totalProductos)}</div><div class="metric-sub">${vFilt.filter(v=>v.tipo==='PRODUCTO').length} ventas</div></div>
    <div class="metric"><div class="metric-label">Propinas</div><div class="metric-value">${fmtCLP(totalPropinas)}</div><div class="metric-sub">${webVentas} ventas web</div></div>
  </div>

  <div class="grid-2" style="margin-bottom:16px">
    <div class="metric"><div class="metric-label">Gastos</div><div class="metric-value" style="color:var(--red)">${fmtCLP(totalGastos)}</div><div class="metric-sub">${gFilt.length} registros</div></div>
    <!-- UTILIDAD BRUTA - deshabilitado temporalmente
    <div class="metric"><div class="metric-label">Utilidad Bruta</div><div class="metric-value" style="color:${utilidad>=0?'var(--green)':'var(--red)'}">${fmtCLP(utilidad)}</div><div class="metric-sub">Ventas - Gastos</div></div>
    -->

function ventaFechaChange(val){
  if(!val) return;
  ventaForm.fecha=val;
  const d=new Date(val+'T12:00:00');
  document.getElementById('vAnio').value=d.getFullYear();
  document.getElementById('vNmes').value=d.getMonth()+1;
  document.getElementById('vMes').value=MESES[d.getMonth()];
  document.getElementById('vDia').value=d.getDate();
  document.getElementById('vDiaSemana').value=DIAS_ES[d.getDay()];
  // check promo
  const isPromo=d.getDay()===2||d.getDay()===3; // mar=2, mie=3
  document.getElementById('promoBadge').style.display=isPromo?'block':'none';
  if(isPromo) applyPromo();
  else {
    const svc=servicios.find(s=>s.id===document.getElementById('vServicio')?.value);
    if(svc) document.getElementById('vMonto').value=svc.precio;
  }
  updateTotal();
}

function applyPromo(){
  const sel=document.getElementById('vServicio');
  if(!sel) return;
  const svc=servicios.find(s=>s.id===sel.value);
  if(!svc) return;
  const d=new Date(ventaForm.fecha+'T12:00:00');
  const isPromo=d.getDay()===2||d.getDay()===3;
  if(isPromo&&(svc.tipo==='promo'||svc.tipo==='menor')&&svc.precio_promo){
    document.getElementById('vMonto').value=svc.precio_promo;
  } else {
    document.getElementById('vMonto').value=svc.precio;
  }
  updateTotal();
}

function ventaServicioChange(){
  applyPromo();
}

function ventaTipoChange(val){
  ventaForm.tipo=val;
  const bs=document.getElementById('bloqueServicio');
  const bp=document.getElementById('bloqueProducto');
  if(bs) bs.style.display=val==='servicio'?'block':'none';
  if(bp) bp.style.display=val==='PRODUCTO'?'block':'none';
  if(val==='PRODUCTO') setTimeout(()=>filtrarProductos(), 0);
  updateTotal();
}

function ventaFormaPagoChange(val){
  document.getElementById('bloqueAuth').style.display=(val==='TK'||val==='TRF'||val==='MP')?'block':'none';
}

function ventaEsWebChange(checked){
  document.getElementById('bloqueWeb').style.display = checked ? 'block' : 'none';
  const fp = document.getElementById('vFormaPago');
  const bSel = document.getElementById('vBarbero');
  if(checked){
    fp.value = 'MP';
    document.getElementById('bloqueAuth').style.display = 'block';
    // Auto-seleccionar PISTON
    const pistonOpt = Array.from(bSel.options).find(o=>o.text.toUpperCase().includes('PISTON'));
    if(pistonOpt) bSel.value = pistonOpt.value;
  } else {
    fp.value = 'EF';
    document.getElementById('bloqueAuth').style.display = 'none';
  }
}

function updateTotal(){
  let monto=0;
  if(ventaForm.tipo==='servicio'){
    monto=Number(document.getElementById('vMonto')?.value||0);
  } else {
    monto=cart.reduce((s,c)=>s+c.total,0);
  }
  const prop=Number(document.getElementById('vPropina')?.value||0);
  const desc=Number(document.getElementById('vDescuento')?.value||0);
  const despacho=Number(document.getElementById('vMontoDespacho')?.value||0);
  document.getElementById('totalEstimado').textContent=fmtCLP(monto+prop-desc+despacho);
}

function filtrarProductos(){
  const buscar = (document.getElementById('pBuscar')?.value||'').toLowerCase().trim();
  const cat    = document.getElementById('pFiltCat')?.value||'';
  const marca  = document.getElementById('pFiltMarca')?.value||'';
  const formato= document.getElementById('pFiltFormato')?.value||'';

  let lista = productos.filter(p=>p.stock>0);
  if(cat)    lista = lista.filter(p=>p.categoria===cat);
  if(marca)  lista = lista.filter(p=>p.marca===marca);
  if(formato)lista = lista.filter(p=>p.formato===formato);
  if(buscar) lista = lista.filter(p=>[p.nombre,p.marca,p.categoria,p.formato].join(' ').toLowerCase().includes(buscar));

  const cont = document.getElementById('pResultados');
  const empty = document.getElementById('pResultadosEmpty');
  if(!cont) return;

  if(lista.length===0){
    cont.innerHTML=''; empty.style.display='block'; return;
  }
  empty.style.display='none';

  cont.innerHTML = lista.map(p=>`
    <div onclick="seleccionarProducto('${p.id}')"
      style="border:1px solid var(--border);border-radius:7px;padding:9px 11px;background:#fff;cursor:pointer;transition:.1s"
      onmouseover="this.style.borderColor='var(--blue)';this.style.background='#EFF6FF'"
      onmouseout="this.style.borderColor='var(--border)';this.style.background='#fff'">
      <div style="font-weight:600;font-size:12px;line-height:1.3">${p.nombre}</div>
      <div style="font-size:11px;color:#64748B;margin-top:2px">${[p.marca,p.formato].filter(Boolean).join(' · ')}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:5px">
        <span style="font-size:12px;font-weight:700;color:var(--blue)">${fmtCLP(p.precio)}</span>
        <span style="font-size:10px;color:${p.stock<=p.stock_minimo?'var(--red)':'#64748B'}">
          ${p.stock<=p.stock_minimo?'⚠ ':''}Stock: ${p.stock}
        </span>
      </div>
    </div>`).join('');
}

function seleccionarProducto(pid){
  const p = productos.find(x=>x.id===pid);
  if(!p) return;
  document.getElementById('vProducto').value = pid;
  document.getElementById('vPrecioUnit').value = p.precio;
  document.getElementById('vCantidad').value = 1;
  document.getElementById('pSelNombre').textContent = p.nombre;
  document.getElementById('pSelDetalle').textContent =
    [p.marca, p.categoria, p.formato, `Stock: ${p.stock}`].filter(Boolean).join(' · ');
  document.getElementById('pSeleccionado').style.display = 'block';
  // Scroll suave al panel de seleccionado
  document.getElementById('pSeleccionado').scrollIntoView({behavior:'smooth',block:'nearest'});
  updateTotal();
}

function limpiarSeleccionProducto(){
  document.getElementById('vProducto').value='';
  document.getElementById('pSeleccionado').style.display='none';
  document.getElementById('pBuscar').value='';
  document.getElementById('pFiltCat').value='';
  document.getElementById('pFiltMarca').value='';
  document.getElementById('pFiltFormato').value='';
  filtrarProductos();
}

function addCartItem(){
  const pid=document.getElementById('vProducto').value;
  if(!pid){toast('Selecciona un producto','error');return;}
  const p=productos.find(x=>x.id===pid);
  if(!p){toast('Producto no encontrado','error');return;}
  const qty=Number(document.getElementById('vCantidad').value||1);
  const pu=Number(document.getElementById('vPrecioUnit').value||p.precio);
  if(qty>p.stock){toast('Stock insuficiente','error');return;}
  const existing=cart.find(c=>c.pid===pid);
  if(existing){existing.qty+=qty;existing.total=existing.qty*existing.precio;}
  else cart.push({pid,nombre:p.nombre,precio:pu,qty,total:pu*qty,stock:p.stock});
  renderCart();updateTotal();
  limpiarSeleccionProducto();
  toast(`✓ ${p.nombre} agregado al carrito`);
}

function removeCartItem(idx){
  cart.splice(idx,1);renderCart();updateTotal();
}

function clearCart(){cart=[];renderCart();updateTotal();}

function renderCart(){
  const c=document.getElementById('cartContainer');
  if(!c) return;
  if(cart.length===0){c.innerHTML='<p style="color:#64748B;font-size:12px">Sin productos en el carrito</p>';return;}
  c.innerHTML=cart.map((it,i)=>`
    <div class="cart-item">
      <span style="flex:1">${it.nombre}</span>
      <span style="width:60px;text-align:center">${it.qty} u.</span>
      <span style="width:90px;text-align:right">${fmtCLP(it.total)}</span>
      <button class="btn btn-danger btn-sm" style="margin-left:8px" onclick="removeCartItem(${i})">✕</button>
    </div>`).join('');
}

async function submitVenta(){
  const bId=document.getElementById('vBarbero').value;
  if(!bId){toast('Selecciona un barbero','error');return;}
  const bNombre=barberos.find(b=>b.id===bId)?.nombre||'';
  const tipo=document.getElementById('vTipo').value;
  const formaPago=document.getElementById('vFormaPago').value;
  if(formaPago==='TK'||formaPago==='TRF'||formaPago==='MP'){
    // Cod. Autorización es opcional
    if(!document.getElementById('vBoleta').value){toast('Ingresa el N° Boleta','error');return;}
  }
  const fecha=document.getElementById('vFecha').value;
  const d=new Date(fecha+'T12:00:00');

  const base={
    barbero_id:bId,barbero_nombre:bNombre,
    anio:d.getFullYear(),n_mes:d.getMonth()+1,mes:MESES[d.getMonth()],
    dia:d.getDate(),dia_semana:DIAS_ES[d.getDay()],fecha,
    propina:Number(document.getElementById('vPropina').value||0),
    descuento:Number(document.getElementById('vDescuento').value||0),
    forma_pago:formaPago,
    es_web:document.getElementById('vEsWeb').checked,
    cliente:document.getElementById('vCliente').value||null,
    comentarios:document.getElementById('vComentarios').value||null,
    cod_autorizacion:document.getElementById('vCodAuth')?.value||null,
    boleta:document.getElementById('vBoleta')?.value||null,
    numero_pedido:document.getElementById('vNroPedido')?.value||null,
    monto_despacho:Number(document.getElementById('vMontoDespacho')?.value||0)||null,
  };

  showOverlay();
  let rows=[];
  const despacho=Number(document.getElementById('vMontoDespacho')?.value||0);
  if(tipo==='servicio'){
    const monto=Number(document.getElementById('vMonto').value||0);
    const svcSel=document.getElementById('vServicio');
    const svc=servicios.find(s=>s.id===svcSel.value);
    rows.push({...base,tipo:'servicio',servicio_producto:svc?.nombre||'',monto,total:monto+base.propina-base.descuento+despacho});
  } else {
    if(cart.length===0){hideOverlay();toast('Agrega productos al carrito','error');return;}
    // El despacho solo se suma a la primera fila para no duplicar
    let primerRow=true;
    for(const it of cart){
      const totalRow=it.total+base.propina-base.descuento+(primerRow?despacho:0);
      rows.push({...base,tipo:'PRODUCTO',servicio_producto:it.nombre,monto:it.total,total:totalRow});
      primerRow=false;
      await sb.from('productos').update({stock:it.stock-it.qty}).eq('id',it.pid);
    }
  }
  const {error}=await sb.from('ventas').insert(rows);
  hideOverlay();
  if(error){toast('Error al guardar: '+error.message,'error');return;}
  toast(`✓ Venta registrada (${rows.length} registro${rows.length>1?'s':''})`)
  cart=[];
  renderVentaForm();
}

// ============ HISTORIAL ============
let hFilters={barbero:'',tipo:'',pago:'',mes:'',buscar:'',anio:'',concil:''};
let hData=[];
let editingVentaId=null;

// Mapa de GetNet por mes/cod para el historial
let hGetnetMap = {}; // key: "anio-mes-codNorm" → {total_gn, propina_gn}

async function loadHistorial(){
  showOverlay();
  await loadCatalogos();
  const {data:raw}=await sb.rpc('get_ventas_historial');
  hData=raw||[];
  // Cargar todos los registros GetNet para cruzar en historial
  const {data:gn}=await sb.from('getnet_transacciones').select('cod_aut,anio,mes,valor_transaccion,propina').range(0,4999);
  hGetnetMap={};
  (gn||[]).forEach(r=>{
    const k=`${r.anio}-${r.mes}-${String(r.cod_aut||'').trim().replace(/^0+/,'')}`;
    if(!hGetnetMap[k]) hGetnetMap[k]={total_gn:0,propina_gn:0,count:0};
    hGetnetMap[k].total_gn+=r.valor_transaccion||0;
    hGetnetMap[k].propina_gn+=r.propina||0;
    hGetnetMap[k].count++;
  });
  hideOverlay();
  renderHistorial();
}

function renderHistorial(){
  let rows=hData;
  if(hFilters.anio) rows=rows.filter(v=>String(v.anio)===hFilters.anio);
  if(hFilters.mes) rows=rows.filter(v=>String(v.n_mes)===hFilters.mes);
  if(hFilters.barbero) rows=rows.filter(v=>v.barbero_nombre===hFilters.barbero);
  if(hFilters.tipo) rows=rows.filter(v=>v.tipo===hFilters.tipo);
  if(hFilters.pago) rows=rows.filter(v=>v.forma_pago===hFilters.pago);
  if(hFilters.buscar){
    const q=hFilters.buscar.toLowerCase();
    rows=rows.filter(v=>(v.cod_autorizacion||'').toLowerCase().includes(q)||(v.barbero_nombre||'').toLowerCase().includes(q)||(v.servicio_producto||'').toLowerCase().includes(q)||(v.cliente||'').toLowerCase().includes(q));
  }
  // Filtro por estado conciliación
  if(hFilters.concil){
    rows=rows.filter(v=>{
      if(v.forma_pago!=='TK') return hFilters.concil==='NO_APLICA';
      if(hFilters.concil==='NO_APLICA') return false;
      const codN=String(v.cod_autorizacion||'').trim().replace(/^0+/,'');
      const k=`${v.anio}-${v.n_mes}-${codN}`;
      const gn=hGetnetMap[k];
      if(hFilters.concil==='SIN_COD') return !v.cod_autorizacion;
      if(!v.cod_autorizacion) return false;
      if(hFilters.concil==='SIN_GETNET') return !gn;
      if(!gn) return false;
      const ventasMismoCod=hData.filter(x=>x.forma_pago==='TK'&&x.anio==v.anio&&x.n_mes==v.n_mes&&x.cod_autorizacion&&String(x.cod_autorizacion).trim().replace(/^0+/,'')==codN);
      const totalSys=ventasMismoCod.reduce((s,x)=>s+(x.total||0),0);
      const propinaSys=ventasMismoCod.reduce((s,x)=>s+(x.propina||0),0);
      const diff=Math.abs(gn.total_gn-totalSys)>100||Math.abs(gn.propina_gn-propinaSys)>100;
      if(hFilters.concil==='DIFERENCIA') return diff;
      if(hFilters.concil==='OK') return !diff;
      return true;
    });
  }

  const anios=[...new Set(hData.map(v=>v.anio))].sort((a,b)=>b-a);
  const bNombres=[...new Set(hData.map(v=>v.barbero_nombre))].filter(Boolean).sort();
  const bOpts=barberos.map(b=>`<option value="${b.id}" data-nombre="${b.nombre}">${b.nombre}</option>`).join('');
  const sOpts=servicios.map(s=>`<option value="${s.nombre}">${s.nombre}</option>`).join('');

  document.getElementById('mainContent').innerHTML=`
  <div class="sec-title">Historial de Ventas</div>
  <div class="filters">
    <select onchange="window._bridge.hSet('anio',this.value)">
      <option value="">Todos los años</option>
      ${anios.map(a=>`<option value="${a}" ${hFilters.anio==a?'selected':''}>${a}</option>`).join('')}
    </select>
    <select onchange="window._bridge.hSet('mes',this.value)">
      <option value="">Todos los meses</option>
      ${MESES.map((m,i)=>`<option value="${i+1}" ${hFilters.mes==i+1?'selected':''}>${m}</option>`).join('')}
    </select>
    <select onchange="window._bridge.hSet('barbero',this.value)">
      <option value="">Todos los barberos</option>
      ${bNombres.map(b=>`<option value="${b}" ${hFilters.barbero===b?'selected':''}>${b}</option>`).join('')}
    </select>
    <select onchange="window._bridge.hSet('tipo',this.value)">
      <option value="">Tipo</option>
      <option value="servicio" ${hFilters.tipo==='servicio'?'selected':''}>Servicio</option>
      <option value="PRODUCTO" ${hFilters.tipo==='PRODUCTO'?'selected':''}>Producto</option>
    </select>
    <select onchange="window._bridge.hSet('pago',this.value)">
      <option value="">Pago</option>
      <option value="EF" ${hFilters.pago==='EF'?'selected':''}>EF</option>
      <option value="TK" ${hFilters.pago==='TK'?'selected':''}>TK</option>
      <option value="TRF" ${hFilters.pago==='TRF'?'selected':''}>TRF</option>
      <option value="MP" ${hFilters.pago==='MP'?'selected':''}>MP</option>
    </select>
    <select onchange="window._bridge.hSet('concil',this.value)">
      <option value="">Estado Concil.</option>
      <option value="OK" ${hFilters.concil==='OK'?'selected':''}>✓ OK</option>
      <option value="DIFERENCIA" ${hFilters.concil==='DIFERENCIA'?'selected':''}>⚠ Diferencia</option>
      <option value="SIN_GETNET" ${hFilters.concil==='SIN_GETNET'?'selected':''}>✗ Sin GetNet</option>
      <option value="SIN_COD" ${hFilters.concil==='SIN_COD'?'selected':''}>Sin Cod. Auth</option>
      <option value="NO_APLICA" ${hFilters.concil==='NO_APLICA'?'selected':''}>No aplica (EF/TRF)</option>
    </select>
    <input type="text" placeholder="Buscar (cod. auth, barbero, servicio...)" value="${hFilters.buscar}" oninput="window._bridge.hBuscar(this.value)" style="min-width:200px">
    <button class="btn btn-ghost btn-sm" onclick="exportHistorialCSV()">⬇ CSV</button>
    <span style="font-size:12px;color:#64748B;margin-left:auto">${rows.length} registros</span>
  </div>
  <div class="card" style="overflow-x:auto">
    <table>
      <thead><tr>
        <th>Fecha</th><th>Barbero</th><th>Tipo</th><th>Servicio/Producto</th>
        <th>Monto</th><th>Propina</th><th>Desc.</th><th>Total</th>
        <th>Pago</th><th>Concil.</th><th>Cod. Auth</th><th>Boleta</th><th>Cliente</th><th>Acciones</th>
      </tr></thead>
      <tbody id="hTbody">
        ${rows.map(v=>renderHistorialRow(v,bOpts,sOpts)).join('')}
      </tbody>
    </table>
  </div>
  `;

  window._bridge.hSet=(k,v)=>{hFilters[k]=v;renderHistorial()};
  window._bridge.hBuscar=(v)=>{
    hFilters.buscar=v;
    // Solo actualizar tbody y contador sin re-renderizar todo (evita perder foco)
    const bOpts=barberos.map(b=>`<option value="${b.id}" data-nombre="${b.nombre}">${b.nombre}</option>`).join('');
    const sOpts=servicios.map(s=>`<option value="${s.nombre}">${s.nombre}</option>`).join('');
    let rows=hData;
    if(hFilters.anio) rows=rows.filter(v=>String(v.anio)===hFilters.anio);
    if(hFilters.mes) rows=rows.filter(v=>String(v.n_mes)===hFilters.mes);
    if(hFilters.barbero) rows=rows.filter(v=>v.barbero_nombre===hFilters.barbero);
    if(hFilters.tipo) rows=rows.filter(v=>v.tipo===hFilters.tipo);
    if(hFilters.pago) rows=rows.filter(v=>v.forma_pago===hFilters.pago);
    if(v){
      const q=v.toLowerCase();
      rows=rows.filter(r=>(r.cod_autorizacion||'').toLowerCase().includes(q)||(r.barbero_nombre||'').toLowerCase().includes(q)||(r.servicio_producto||'').toLowerCase().includes(q)||(r.cliente||'').toLowerCase().includes(q));
    }
    if(hFilters.concil){
      rows=rows.filter(r=>{
        if(r.forma_pago!=='TK') return hFilters.concil==='NO_APLICA';
        if(hFilters.concil==='NO_APLICA') return false;
        const codN=String(r.cod_autorizacion||'').trim().replace(/^0+/,'');
        const k=`${r.anio}-${r.n_mes}-${codN}`;
        const gn=hGetnetMap[k];
        if(hFilters.concil==='SIN_COD') return !r.cod_autorizacion;
        if(!r.cod_autorizacion) return false;
        if(hFilters.concil==='SIN_GETNET') return !gn;
        if(!gn) return false;
        const vmc=hData.filter(x=>x.forma_pago==='TK'&&x.anio==r.anio&&x.n_mes==r.n_mes&&x.cod_autorizacion&&String(x.cod_autorizacion).trim().replace(/^0+/,'')==codN);
        const tSys=vmc.reduce((s,x)=>s+(x.total||0),0);
        const pSys=vmc.reduce((s,x)=>s+(x.propina||0),0);
        const diff=Math.abs(gn.total_gn-tSys)>100||Math.abs(gn.propina_gn-pSys)>100;
        if(hFilters.concil==='DIFERENCIA') return diff;
        if(hFilters.concil==='OK') return !diff;
        return true;
      });
    }
    const tbody=document.getElementById('hTbody');
    if(tbody) tbody.innerHTML=rows.map(r=>renderHistorialRow(r,bOpts,sOpts)).join('');
    const cnt=document.querySelector('.filters span[style*="margin-left:auto"]');
    if(cnt) cnt.textContent=`${rows.length} registros`;
  };
}

function getConcilBadge(v){
  // Solo aplica a TK
  if(v.forma_pago!=='TK') return '<td><span style="color:#CBD5E1;font-size:10px">—</span></td>';
  if(!v.cod_autorizacion) return '<td><span class="badge badge-gray" title="Sin cod. auth">Sin cod</span></td>';
  const codN=String(v.cod_autorizacion).trim().replace(/^0+/,'');
  const k=`${v.anio}-${v.n_mes}-${codN}`;
  const gn=hGetnetMap[k];
  if(!gn){
    return `<td><span class="badge badge-red" style="font-size:10px;cursor:default" title="No encontrado en GetNet">Sin GetNet</span></td>`;
  }
  // Agrupar ventas del mismo cod para comparar totales
  const ventasMismoCod=hData.filter(x=>x.forma_pago==='TK'&&x.anio==v.anio&&x.n_mes==v.n_mes&&x.cod_autorizacion&&String(x.cod_autorizacion).trim().replace(/^0+/,'')==codN);
  const totalSys=ventasMismoCod.reduce((s,x)=>s+(x.total||0),0);
  const propinaSys=ventasMismoCod.reduce((s,x)=>s+(x.propina||0),0);
  if(Math.abs(gn.total_gn-totalSys)>100||Math.abs(gn.propina_gn-propinaSys)>100){
    return `<td><span class="badge badge-amber" style="font-size:10px;cursor:default" title="GetNet: ${fmtCLP(gn.total_gn)} | Sistema: ${fmtCLP(totalSys)}">Diferencia</span></td>`;
  }
  return `<td><span class="badge badge-green" style="font-size:10px;cursor:default" title="OK: ${fmtCLP(gn.total_gn)}">✓ OK</span></td>`;
}

      <span class="view-cell">${fmtCLP(v.descuento)}</span>

      <span class="view-cell">${v.cliente||''}</span>
      <span class="edit-cell"><input type="text" id="he-cliente-${v.id}" value="${v.cliente||''}" style="width:90px"></span>

         <button class="btn btn-ghost btn-sm" onclick="cancelEditVenta()">✕</button>`:

function startEditVenta(id){
  editingVentaId=id;
  renderHistorial();
  // set select values
  const v=hData.find(r=>r.id===id);if(!v) return;
  setTimeout(()=>{
    const bSel=document.getElementById(`he-barbero-${id}`);
    if(bSel) bSel.value=v.barbero_id||'';
    const tSel=document.getElementById(`he-tipo-${id}`);
    if(tSel) tSel.value=v.tipo||'servicio';
    const pSel=document.getElementById(`he-pago-${id}`);
    if(pSel) pSel.value=v.forma_pago||'EF';
  },0);
}

function cancelEditVenta(){editingVentaId=null;renderHistorial();}

async function saveEditVenta(id){
  const bSel=document.getElementById(`he-barbero-${id}`);
  const bId=bSel?.value;
  const bNombre=barberos.find(b=>b.id===bId)?.nombre||document.getElementById(`he-barbero-${id}`)?.selectedOptions[0]?.text||'';
  const fecha=document.getElementById(`he-fecha-${id}`)?.value;
  const d=fecha?new Date(fecha+'T12:00:00'):null;
  const monto=Number(document.getElementById(`he-monto-${id}`)?.value||0);
  const propina=Number(document.getElementById(`he-propina-${id}`)?.value||0);
  const descuento=Number(document.getElementById(`he-descuento-${id}`)?.value||0);
  const updates={
    barbero_id:bId,barbero_nombre:bNombre,
    fecha,
    anio:d?.getFullYear(),n_mes:d?d.getMonth()+1:null,mes:d?MESES[d.getMonth()]:null,
    dia:d?.getDate(),dia_semana:d?DIAS_ES[d.getDay()]:null,
    tipo:document.getElementById(`he-tipo-${id}`)?.value,
    servicio_producto:document.getElementById(`he-sp-${id}`)?.value,
    monto,propina,descuento,total:monto+propina-descuento,
    forma_pago:document.getElementById(`he-pago-${id}`)?.value,
    cod_autorizacion:document.getElementById(`he-auth-${id}`)?.value||null,
    boleta:document.getElementById(`he-boleta-${id}`)?.value||null,
    cliente:document.getElementById(`he-cliente-${id}`)?.value||null,
  };
  showOverlay();
  const {error}=await sb.from('ventas').update(updates).eq('id',id);
  if(error){hideOverlay();toast('Error: '+error.message,'error');return;}
  editingVentaId=null;
  const {data}=await sb.from('ventas').select('*').order('fecha',{ascending:false});
  hData=data||[];
  hideOverlay();
  toast('✓ Venta actualizada');
  renderHistorial();
}

async function deleteVenta(id){
  if(!confirm('¿Eliminar esta venta?')) return;
  showOverlay();
  const {error}=await sb.from('ventas').delete().eq('id',id);
  hideOverlay();
  if(error){toast('Error: '+error.message,'error');return;}
  hData=hData.filter(v=>v.id!==id);
  toast('✓ Venta eliminada');
  renderHistorial();
}

function exportHistorialCSV(){
  let rows=hData;
  if(hFilters.anio) rows=rows.filter(v=>String(v.anio)===hFilters.anio);
  if(hFilters.mes) rows=rows.filter(v=>String(v.n_mes)===hFilters.mes);
  if(hFilters.barbero) rows=rows.filter(v=>v.barbero_nombre===hFilters.barbero);
  if(hFilters.tipo) rows=rows.filter(v=>v.tipo===hFilters.tipo);
  if(hFilters.pago) rows=rows.filter(v=>v.forma_pago===hFilters.pago);
  if(hFilters.buscar){const q=hFilters.buscar.toLowerCase();rows=rows.filter(v=>(v.cod_autorizacion||'').toLowerCase().includes(q)||(v.barbero_nombre||'').toLowerCase().includes(q)||(v.servicio_producto||'').toLowerCase().includes(q));}
  const hdr=['Cod. Autorizacion','Boleta','Año','N° Mes','Mes','Dia','Dia Semana','Fecha','Barbero','Tipo','Cliente','Servicio/Producto','Monto','Propina','Descuento','Total','Forma Pago','Es Web','Comentarios'];
  const lines=[hdr.join(';'),...rows.map(v=>[v.cod_autorizacion||'',v.boleta||'',v.anio,v.n_mes,v.mes,v.dia,v.dia_semana,v.fecha,v.barbero_nombre,v.tipo,v.cliente||'',v.servicio_producto,v.monto,v.propina,v.descuento,v.total,v.forma_pago,v.es_web?'SI':'NO',v.comentarios||''].join(';'))];
  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`piston_ventas_${today()}.csv`;a.click();
}

  const cls=isEditing?'row-editing':'';
  return `<tr id="prow-${p.id}" class="${cls}">
    <td>
      <span class="view-cell">${p.categoria||''}</span>
      <span class="edit-cell"><input type="text" id="pe-cat-${p.id}" value="${p.categoria||''}"></span>
    </td>
    <td>
      <span class="view-cell">${p.marca||''}</span>
      <span class="edit-cell"><input type="text" id="pe-marca-${p.id}" value="${p.marca||''}"></span>
    </td>
    <td>
      <span class="view-cell">${p.nombre}</span>
      <span class="edit-cell"><input type="text" id="pe-nombre-${p.id}" value="${p.nombre}"></span>
    </td>
    <td>
      <span class="view-cell">${p.formato||''}</span>
      <span class="edit-cell"><input type="text" id="pe-formato-${p.id}" value="${p.formato||''}"></span>
    </td>
    <td>
      <span class="view-cell">${fmtCLP(p.precio)}</span>
      <span class="edit-cell"><input type="number" id="pe-precio-${p.id}" value="${p.precio}" style="width:80px"></span>
    </td>
    <td>
      <span class="view-cell">${fmtCLP(p.costo||0)}</span>
      <span class="edit-cell"><input type="number" id="pe-costo-${p.id}" value="${p.costo||0}" style="width:80px"></span>
    </td>
    <td>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="view-cell" style="font-weight:700;color:${stockColor}">${p.stock}</span>
        <span class="edit-cell"><input type="number" id="pe-stock-${p.id}" value="${p.stock}" style="width:60px"></span>
        <div class="view-cell" style="width:60px">
          <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,pct)}%;background:${stockColor}"></div></div>
        </div>
      </div>
    </td>
    <td>
      <span class="view-cell">${p.stock_minimo||2}</span>
      <span class="edit-cell"><input type="number" id="pe-stmin-${p.id}" value="${p.stock_minimo||2}" style="width:60px"></span>
    </td>
    <td>
      <span class="view-cell">
        ${p.stock<=p.stock_minimo?'<span class="badge badge-red">Bajo</span>':p.stock<=p.stock_minimo*2?'<span class="badge badge-amber">Alerta</span>':'<span class="badge badge-green">OK</span>'}
      </span>
    </td>
    <td style="white-space:nowrap">
      ${isEditing?
        `<button class="btn btn-success btn-sm" onclick="saveEditProducto('${p.id}')">✓</button>
         <button class="btn btn-ghost btn-sm" onclick="cancelEditProducto()">✕</button>`:
        `<button class="btn btn-ghost btn-sm" onclick="startEditProducto('${p.id}')">✏</button>
         <button class="btn btn-danger btn-sm" onclick="deleteProducto('${p.id}')">🗑</button>`}
    </td>
  </tr>`;
}

function startEditProducto(id){editingProdId=id;renderInventario();}
function cancelEditProducto(){editingProdId=null;renderInventario();}

async function saveProducto(){
  const obj={
    categoria:document.getElementById('pCat').value,
    marca:document.getElementById('pMarca').value,
    nombre:document.getElementById('pNombre').value,
    formato:document.getElementById('pFormato').value,
    precio:Number(document.getElementById('pPrecio').value||0),
    costo:Number(document.getElementById('pCosto').value||0),
    stock:Number(document.getElementById('pStock').value||0),
    stock_minimo:Number(document.getElementById('pStockMin').value||2),
  };
  if(!obj.nombre){toast('Ingresa el nombre','error');return;}
  showOverlay();
  const {error}=await sb.from('productos').insert(obj);
  hideOverlay();
  if(error){toast('Error: '+error.message,'error');return;}
  toast('✓ Producto agregado');
  loadInventario();
}

async function saveEditProducto(id){
  const updates={
    categoria:document.getElementById(`pe-cat-${id}`)?.value,
    marca:document.getElementById(`pe-marca-${id}`)?.value,
    nombre:document.getElementById(`pe-nombre-${id}`)?.value,
    formato:document.getElementById(`pe-formato-${id}`)?.value,
    precio:Number(document.getElementById(`pe-precio-${id}`)?.value||0),
    costo:Number(document.getElementById(`pe-costo-${id}`)?.value||0),
    stock:Number(document.getElementById(`pe-stock-${id}`)?.value||0),
    stock_minimo:Number(document.getElementById(`pe-stmin-${id}`)?.value||2),
  };
  showOverlay();
  const {error}=await sb.from('productos').update(updates).eq('id',id);
  if(error){hideOverlay();toast('Error: '+error.message,'error');return;}
  editingProdId=null;
  const {data}=await sb.from('productos').select('*').order('categoria').order('nombre');
  invData=data||[];hideOverlay();
  toast('✓ Producto actualizado');
  renderInventario();
}

async function deleteProducto(id){
  if(!confirm('¿Eliminar producto?')) return;
  showOverlay();
  const {error}=await sb.from('productos').delete().eq('id',id);
  hideOverlay();
  if(error){toast('Error: '+error.message,'error');return;}
  invData=invData.filter(p=>p.id!==id);
  toast('✓ Producto eliminado');
  renderInventario();
}

function gastoAcciones(id,isEditing){
  return isEditing
    ?`<button class="btn btn-success btn-sm" onclick="saveEditGasto('${id}')">✓</button>
      <button class="btn btn-ghost btn-sm" onclick="cancelEditGasto()">✕</button>`
    :`<button class="btn btn-ghost btn-sm" onclick="startEditGasto('${id}')">✏</button>
      <button class="btn btn-danger btn-sm" onclick="deleteGasto('${id}')">🗑</button>`;
}

function startEditGasto(id){
  editingGastoId=id; renderGastos();
  const g=gastoData.find(x=>x.id===id); if(!g) return;
  setTimeout(()=>{
    const bs=document.getElementById(`ge-barbero-${id}`); if(bs) bs.value=g.barbero_nombre||'';
  },0);
}
function cancelEditGasto(){editingGastoId=null; renderGastos();}

async function saveGasto(){
  const fecha=document.getElementById('gFecha')?.value;
  const monto=Number(document.getElementById('gMonto')?.value||0);
  if(!fecha){toast('Ingresa la fecha','error');return;}
  if(!monto){toast('Ingresa el monto','error');return;}

  let obj={fecha, monto, categoria:gastoTabActiva, forma_pago:'EF'};

  if(gastoTabActiva==='Adelantos'){
    const barb=document.getElementById('gBarbero')?.value;
    if(!barb){toast('Selecciona el barbero','error');return;}
    obj.barbero_nombre=barb;
    obj.descripcion=`Adelanto – ${barb}`;
  } else if(gastoTabActiva==='Proveedores'){
    const prov=document.getElementById('gProveedor')?.value;
    if(!prov){toast('Ingresa el nombre del proveedor','error');return;}
    obj.nombre_proveedor=prov;
    obj.tipo_documento=document.getElementById('gTipoDoc')?.value;
    obj.numero_documento=document.getElementById('gNumDoc')?.value||null;
    obj.detalle=document.getElementById('gDetalle')?.value||null;
    obj.descripcion=prov;
  } else {
    obj.detalle=document.getElementById('gDetalle')?.value||null;
    obj.descripcion=obj.detalle||'Retiro';
  }

  showOverlay();
  const {error}=await sb.from('gastos').insert(obj);
  hideOverlay();
  if(error){toast('Error: '+error.message,'error');return;}
  toast('✓ Registrado');
  loadGastos();
}

async function saveEditGasto(id){
  const g=gastoData.find(x=>x.id===id); if(!g) return;
  const updates={
    fecha:document.getElementById(`ge-fecha-${id}`)?.value,
    monto:Number(document.getElementById(`ge-monto-${id}`)?.value||0),
  };
  if(g.categoria==='Adelantos'){
    const bv=document.getElementById(`ge-barbero-${id}`)?.value;
    updates.barbero_nombre=bv;
    updates.descripcion=`Adelanto – ${bv}`;
  } else if(g.categoria==='Proveedores'){
    updates.nombre_proveedor=document.getElementById(`ge-prov-${id}`)?.value||null;
    updates.tipo_documento=document.getElementById(`ge-tipodoc-${id}`)?.value||null;
    updates.numero_documento=document.getElementById(`ge-numdoc-${id}`)?.value||null;
    updates.detalle=document.getElementById(`ge-detalle-${id}`)?.value||null;
    updates.descripcion=updates.nombre_proveedor||'Proveedor';
  } else {
    updates.detalle=document.getElementById(`ge-detalle-${id}`)?.value||null;
    updates.descripcion=updates.detalle||'Retiro';
  }
  showOverlay();
  const {error}=await sb.from('gastos').update(updates).eq('id',id);
  if(error){hideOverlay();toast('Error: '+error.message,'error');return;}
  editingGastoId=null;
  const {data}=await sb.from('gastos').select('*').order('fecha',{ascending:false});
  gastoData=data||[]; hideOverlay();
  toast('✓ Actualizado'); renderGastos();
}

async function deleteGasto(id){
  if(!confirm('¿Eliminar registro?')) return;
  showOverlay();
  const {error}=await sb.from('gastos').delete().eq('id',id);
  hideOverlay(); if(error){toast('Error: '+error.message,'error');return;}
  gastoData=gastoData.filter(g=>g.id!==id);
  toast('✓ Eliminado'); renderGastos();
}


// ============ CONCILIACIÓN ============
let concilState = { mes: new Date().getMonth()+1, anio: new Date().getFullYear(), ventasTK:[], getnetRows:[], resultados:[] };

async function loadConciliacion(){
  showOverlay();
  const {data:vtk} = await sb.rpc('get_ventas_tk_anio', {p_anio: concilState.anio, p_mes: concilState.mes});
  concilState.ventasTK = vtk||[];
  // Cargar GetNet guardado para este mes
  const {data:gn} = await sb.from('getnet_transacciones')
    .select('*').eq('anio', concilState.anio).eq('mes', concilState.mes)
    .order('fecha_venta');
  concilState.getnetRows = (gn||[]).map(r=>({
    cod: r.cod_aut, fecha: r.fecha_venta, marca: r.marca, tipo: r.tipo,
    monto: r.valor_venta, propina: r.propina, total: r.valor_transaccion, estado: r.estado
  }));
  hideOverlay();
  renderConciliacion();
}

      <select id="concilMes" onchange="window._bridge.concilSetMes(this.value)" style="padding:7px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px">${mesOpts}</select>

        <div style="font-size:11px;color:#64748B;margin-top:3px">

function buildConcilResult(){ return '<div id="concilResultInner"></div>'; }

async function processConcilFile(input){
  const file=input.files[0]; if(!file) return;
  document.getElementById('concilLoading').style.display='block';
  try{
    const XL = await getXLSX();
    const buf = await file.arrayBuffer();
    const wb  = XL.read(buf,{type:'array'});
    const ws  = wb.Sheets[wb.SheetNames[0]];
    const raw = XL.utils.sheet_to_json(ws,{defval:''});

    const normalize = s=>String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[\s.]/g,'').toUpperCase();
    function getGN(row,...keys){
      for(const k of keys){
        const nk=normalize(k);
        const found=Object.keys(row).find(rk=>normalize(rk)===nk);
        if(found!==undefined&&row[found]!=='') return String(row[found]).trim();
      }
      return '';
    }

    // Parsear y guardar en Supabase
    const rows = raw.map(r=>({
      cod_aut:          String(getGN(r,'COD.AUT','CODAUT')||'').trim(),
      fecha_venta:      parseFechaGetnet(getGN(r,'FECHA VENTA','FECHAVENTA')),
      mes:              concilState.mes,
      anio:             concilState.anio,
      marca:            getGN(r,'MARCA')||null,
      tipo:             getGN(r,'TIPO')||null,
      propina:          Number(getGN(r,'PROPINA')||0),
      valor_venta:      Number(getGN(r,'VALOR VENTA','VALORVENTA')||0),
      valor_transaccion:Number(getGN(r,'VALOR TRANSACCION','VALORTRANSACCION','VALOR TRANSACCIÓN')||0),
      estado:           getGN(r,'ESTADO TRANSACCION','ESTADOTRANSACCION','ESTADO TRANSACCIÓN')||null,
      archivo_origen:   file.name,
    })).filter(r=>r.cod_aut&&r.cod_aut!=='-');

    if(!rows.length){ toast('Sin transacciones válidas en el archivo','error'); document.getElementById('concilLoading').style.display='none'; return; }

    showOverlay();
    // Borrar datos existentes del mes y reemplazar
    await sb.from('getnet_transacciones').delete().eq('anio',concilState.anio).eq('mes',concilState.mes);
    // Insertar en lotes de 100
    for(let i=0;i<rows.length;i+=100){
      await sb.from('getnet_transacciones').insert(rows.slice(i,i+100));
    }

    concilState.getnetRows = rows.map(r=>({
      cod:r.cod_aut, fecha:r.fecha_venta, marca:r.marca, tipo:r.tipo,
      monto:r.valor_venta, propina:r.propina, total:r.valor_transaccion, estado:r.estado
    }));
    hideOverlay();
    document.getElementById('concilLoading').style.display='none';
    toast(`✓ ${rows.length} transacciones GetNet guardadas`);
    renderConciliacion();
  }catch(err){
    hideOverlay();
    document.getElementById('concilLoading').style.display='none';
    toast('Error: '+err.message,'error'); console.error(err);
  }
}

function parseFechaGetnet(v){
  if(!v) return null;
  const s=String(v).trim();
  // DD/MM/YYYY HH:MM:SS
  const m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
  if(m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  const iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso) return `${iso[1]}-${iso[2]}-${iso[3]}`;
  return null;
}

function normCod(v){ return String(v||'').trim().replace(/^0+/,''); }

function runConciliacion(){
  const { getnetRows, mes, anio } = concilState;
  const vtkMes = concilState.ventasTK;

  // Ventas sin código de autorización — no se pueden conciliar
  const sinCodRows = vtkMes.filter(v=>!v.cod_autorizacion);
  const sinCodTotal = sinCodRows.reduce((s,v)=>s+(v.total||0),0);

  const ventasByCod={};
  vtkMes.forEach(v=>{
    if(!v.cod_autorizacion) return;
    const k=normCod(v.cod_autorizacion);
    if(!ventasByCod[k]) ventasByCod[k]=[];
    ventasByCod[k].push(v);
  });

  const getnetCods=new Set(getnetRows.map(r=>normCod(r.cod)));
  let ok=0,diffs=0,missing=0;
  const resultados=getnetRows.map(r=>{
    const codN=normCod(r.cod);
    const vsys=ventasByCod[codN];
    if(!vsys){ missing++; return{...r,codN,estado:'FALTANTE EN SISTEMA',montoSys:null,propinaSys:null,totalSys:null,vsys:null}; }
    const montoSys=vsys.reduce((s,v)=>s+(v.monto||0),0);
    const propinaSys=vsys.reduce((s,v)=>s+(v.propina||0),0);
    const totalSys=vsys.reduce((s,v)=>s+(v.total||0),0);
    if(Math.abs(r.monto-montoSys)>100||Math.abs(r.propina-propinaSys)>100){ diffs++; return{...r,codN,estado:'DIFERENCIA',montoSys,propinaSys,totalSys,vsys}; }
    ok++; return{...r,codN,estado:'OK',montoSys,propinaSys,totalSys,vsys};
  });

  const sinGetNet=Object.entries(ventasByCod).filter(([k])=>!getnetCods.has(k)).map(([k,vs])=>({
    cod:k,codN:k,estado:'EN SISTEMA SIN GETNET',
    monto:vs.reduce((s,v)=>s+(v.monto||0),0),propina:vs.reduce((s,v)=>s+(v.propina||0),0),
    total:vs.reduce((s,v)=>s+(v.total||0),0),montoSys:null,propinaSys:null,totalSys:null,vsys:vs,
    fecha:vs[0].fecha,marca:'—'
  }));

  // Ventas sin cod como fila especial en tabla
  const sinCodEntradas = sinCodRows.map(v=>({
    cod:'(sin código)',codN:'',estado:'SIN COD. AUTH',
    monto:v.monto,propina:v.propina,total:v.total,montoSys:null,propinaSys:null,totalSys:null,
    fecha:v.fecha,marca:'—',vsys:[v]
  }));

  const todosResultados=[...resultados,...sinGetNet,...sinCodEntradas];
  concilState.resultados=resultados;
  concilState.todosResultados=todosResultados;

  const totalGetNet=getnetRows.reduce((s,r)=>s+r.total,0);
  // Excluir ventas sin cod del total sistema para que la diferencia sea real
  const totalSistema=vtkMes.filter(v=>v.cod_autorizacion).reduce((s,v)=>s+(v.total||0),0);
  const diffTotal=totalGetNet-totalSistema;

  const target=document.getElementById('concilResult');
  if(!target) return;
  target.innerHTML=`
  <div class="grid-4" style="margin-bottom:16px">
    <div class="metric"><div class="metric-label">GetNet (${getnetRows.length} txn)</div><div class="metric-value">${fmtCLP(totalGetNet)}</div></div>
    <div class="metric"><div class="metric-label">Sistema TK (${vtkMes.length} reg)</div>
      <div class="metric-value">${fmtCLP(totalSistema)}</div>
      ${sinCodRows.length>0?`<div class="metric-sub" style="color:var(--red)">⚠ ${sinCodRows.length} sin cod. auth (${fmtCLP(sinCodTotal)})</div>`:''}
    </div>
    <div class="metric"><div class="metric-label">Diferencia</div><div class="metric-value" style="color:${Math.abs(diffTotal)<100?'var(--green)':'var(--red)'}">${diffTotal>=0?'+':''}${fmtCLP(diffTotal)}</div></div>
    <div class="metric"><div class="metric-label">Resumen</div>
      <div style="display:flex;flex-direction:column;gap:4px;margin-top:4px">
        <span class="badge badge-green">✓ OK: ${ok}</span>
        <span class="badge badge-amber">⚠ Diferencia: ${diffs}</span>
        <span class="badge badge-red">✗ Sin sistema: ${missing}</span>
        ${sinGetNet.length?`<span class="badge badge-purple">↩ Sin GetNet: ${sinGetNet.length}</span>`:''}
        ${sinCodRows.length?`<span class="badge badge-gray">? Sin cod. auth: ${sinCodRows.length}</span>`:''}
      </div>
    </div>
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${[
          {k:'TODOS', label:`Todos (${todosResultados.length})`, bg:'#DBEAFE', color:'#1D4ED8', border:'#93C5FD'},
          {k:'OK', label:`✓ OK (${ok})`, bg:'#DCFCE7', color:'#15803D', border:'#86EFAC'},
          {k:'DIFERENCIA', label:`⚠ Diferencia (${diffs})`, bg:'#FEF3C7', color:'#B45309', border:'#FCD34D'},
          {k:'FALTANTE EN SISTEMA', label:`✗ Sin sistema (${missing})`, bg:'#FEE2E2', color:'#DC2626', border:'#FCA5A5'},
          {k:'EN SISTEMA SIN GETNET', label:`↩ Sin GetNet (${sinGetNet.length})`, bg:'#EDE9FE', color:'#6D28D9', border:'#C4B5FD'},
          {k:'SIN COD. AUTH', label:`? Sin cod. (${sinCodRows.length})`, bg:'#F1F5F9', color:'#475569', border:'#CBD5E1'},
        ].map((f,i)=>`
          <button id="cfbtn-${f.k.replace(/ /g,'_')}"
            onclick="window._bridge.concilFiltrar('${f.k}')"
            style="padding:5px 12px;border:2px solid ${i===0?f.border:'transparent'};border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;
                   background:${i===0?f.bg:'#F1F5F9'};color:${i===0?f.color:'#475569'};transition:.15s">
            ${f.label}
          </button>`).join('')}
      </div>
      ${(diffs+missing+sinGetNet.length)>0?`<button class="btn btn-ghost btn-sm" onclick="exportConcilErrors()">⬇ Exportar errores CSV</button>`:''}
    </div>
    <div style="overflow-x:auto" id="concilTablaWrap">
      ${renderConcilTabla(todosResultados)}
    </div>
  </div>`;

  // Registrar bridge
  const filtroMeta=[
    {k:'TODOS', bg:'#DBEAFE', color:'#1D4ED8', border:'#93C5FD'},
    {k:'OK', bg:'#DCFCE7', color:'#15803D', border:'#86EFAC'},
    {k:'DIFERENCIA', bg:'#FEF3C7', color:'#B45309', border:'#FCD34D'},
    {k:'FALTANTE EN SISTEMA', bg:'#FEE2E2', color:'#DC2626', border:'#FCA5A5'},
    {k:'EN SISTEMA SIN GETNET', bg:'#EDE9FE', color:'#6D28D9', border:'#C4B5FD'},
    {k:'SIN COD. AUTH', bg:'#F1F5F9', color:'#475569', border:'#CBD5E1'},
  ];
  window._bridge.concilFiltrar = k => {
    // Actualizar estilos de botones
    filtroMeta.forEach(f=>{
      const btn=document.getElementById(`cfbtn-${f.k.replace(/ /g,'_')}`);
      if(!btn) return;
      if(f.k===k){ btn.style.background=f.bg; btn.style.color=f.color; btn.style.borderColor=f.border; }
      else { btn.style.background='#F1F5F9'; btn.style.color='#475569'; btn.style.borderColor='transparent'; }
    });
    const lista = k==='TODOS' ? concilState.todosResultados : concilState.todosResultados.filter(r=>r.estado===k);
    document.getElementById('concilTablaWrap').innerHTML = renderConcilTabla(lista);
  };
}

function renderConcilTabla(lista){
  if(!lista.length) return '<p style="text-align:center;padding:20px;color:#64748B">Sin registros para este filtro</p>';
  return `<table>
    <thead><tr><th>Cod. Auth</th><th>Fecha</th><th>Marca</th><th>Monto GetNet</th><th>Monto Sis.</th><th>Propina GetNet</th><th>Propina Sis.</th><th>Total GetNet</th><th>Total Sis.</th><th>Estado</th></tr></thead>
    <tbody>
      ${lista.map(r=>`
      <tr class="${r.estado==='OK'?'concil-match':r.estado==='DIFERENCIA'?'concil-diff':'concil-missing'}">
        <td style="font-family:monospace;font-size:11px">${r.cod}</td>
        <td>${r.fecha?String(r.fecha).split('T')[0]:''}</td>
        <td>${r.marca||'—'}</td>
        <td>${r.monto!=null?fmtCLP(r.monto):'—'}</td><td>${r.montoSys!=null?fmtCLP(r.montoSys):'—'}</td>
        <td>${r.propina!=null?fmtCLP(r.propina):'—'}</td><td>${r.propinaSys!=null?fmtCLP(r.propinaSys):'—'}</td>
        <td>${r.total!=null?fmtCLP(r.total):'—'}</td><td>${r.totalSys!=null?fmtCLP(r.totalSys):'—'}</td>
        <td><span class="badge ${r.estado==='OK'?'badge-green':r.estado==='DIFERENCIA'?'badge-amber':r.estado==='EN SISTEMA SIN GETNET'?'badge-purple':'badge-red'}" style="white-space:nowrap">${r.estado}</span></td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

function exportConcilErrors(){
